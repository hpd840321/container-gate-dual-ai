<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="850" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="auxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fda085;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="containerGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#718096;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5568;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="850" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="600" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    5.5摄像头方案：侧壁安装模式（5基础+1辅助）
  </text>
  <text x="600" y="60" text-anchor="middle" font-size="14" fill="#666">
    双20尺集装箱纵向排列（后箱+前箱），道闸前后立柱安装，含C7辅助相机
  </text>
  
  <!-- 道闸前立柱（左侧） -->
  <g transform="translate(0, 100)">
    <rect x="280" y="50" width="20" height="400" fill="url(#poleGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- 道闸前立柱（右侧） -->
  <g transform="translate(0, 100)">
    <rect x="680" y="50" width="20" height="400" fill="url(#poleGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- 道闸后立柱（左侧） -->
  <g transform="translate(0, 100)">
    <rect x="750" y="50" width="20" height="400" fill="url(#poleGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- 道闸后立柱（右侧） -->
  <g transform="translate(0, 100)">
    <rect x="1050" y="50" width="20" height="400" fill="url(#poleGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- 道闸横杆 -->
  <g transform="translate(0, 100)">
    <rect x="290" y="430" width="400" height="15" fill="#e53e3e" filter="url(#shadow)"/>
    <text x="490" y="470" text-anchor="middle" font-size="14" fill="#666">道闸栏杆</text>
  </g>
  
  <!-- 道闸标识 -->
  <g transform="translate(0, 85)">
    <text x="490" y="0" text-anchor="middle" font-size="13" fill="#666" font-weight="bold">道闸区域</text>
    <line x1="300" y1="10" x2="680" y2="10" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 道闸前上方相机 C5（左侧，拍摄车尾+后箱） -->
  <g transform="translate(290, 170)">
    <circle cx="0" cy="0" r="28" fill="url(#sideGrad)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="13" fill="white" font-weight="bold">C5</text>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#667eea">道闸前上方</text>
    <text x="0" y="60" text-anchor="middle" font-size="10" fill="#999">高度 8-10m</text>
    
    <!-- 视野范围（高角度俯拍车尾+后箱） -->
    <path d="M -30,25 L -80,300 L 180,300 L 80,25 Z" fill="rgba(102,126,234,0.15)" stroke="#667eea" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 道闸后上方相机 C6（右侧，拍摄前箱+车头） -->
  <g transform="translate(1070, 170)">
    <circle cx="0" cy="0" r="28" fill="url(#sideGrad)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="13" fill="white" font-weight="bold">C6</text>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#764ba2">道闸后上方</text>
    <text x="0" y="60" text-anchor="middle" font-size="10" fill="#999">高度 8-10m</text>
    
    <!-- 视野范围（高角度俯拍前箱+车头） -->
    <path d="M -30,25 L -180,300 L 80,300 L 30,25 Z" fill="rgba(118,75,162,0.15)" stroke="#764ba2" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 辅助相机 C7（道闸前侧方，拍摄后箱+前箱门端ISO码） -->
  <g transform="translate(180, 420)">
    <circle cx="0" cy="0" r="30" fill="url(#auxGrad)" filter="url(#shadow)" stroke="#f6ad55" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C7</text>
    <text x="0" y="48" text-anchor="middle" font-size="11" fill="#dd6b20" font-weight="bold">★辅助相机</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#999">前侧方 3-4m</text>
    <text x="0" y="80" text-anchor="middle" font-size="9" fill="#999">45°角/6mm</text>
    
    <!-- 视野范围（45°角侧拍双箱） -->
    <path d="M 30,0 L 200,-40 L 200,60 L 30,20 Z" fill="rgba(246,211,101,0.2)" stroke="#f6ad55" stroke-width="1.5" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 车道边界 -->
  <g transform="translate(0, 200)">
    <rect x="280" y="0" width="700" height="280" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="630" y="-15" text-anchor="middle" font-size="13" fill="#666">车道宽度 3.5m</text>
  </g>
  
  <!-- 车尾（示意） - 在最左侧（入口） -->
  <g transform="translate(300, 280)">
    <rect x="0" y="0" width="40" height="120" rx="5" fill="#718096" filter="url(#shadow)"/>
    <text x="20" y="50" text-anchor="middle" font-size="10" fill="white">车</text>
    <text x="20" y="70" text-anchor="middle" font-size="10" fill="white">尾</text>
    <text x="20" y="95" text-anchor="middle" font-size="9" fill="white">（入口）</text>
  </g>
  
  <!-- 后箱（20尺）- 纵向排列，靠上方，靠近车尾（左侧） -->
  <g transform="translate(350, 260)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="url(#containerGrad)" filter="url(#shadow)" opacity="0.9"/>
    <text x="90" y="40" text-anchor="middle" font-size="16" fill="white" font-weight="bold">20尺箱 A</text>
    <text x="90" y="62" text-anchor="middle" font-size="13" fill="white">（后箱）</text>
    <text x="90" y="82" text-anchor="middle" font-size="11" fill="white" font-style="italic">靠近车尾</text>
    
    <!-- 箱号区域标识 -->
    <rect x="120" y="12" width="45" height="25" rx="3" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
    <text x="142" y="29" text-anchor="middle" font-size="9" fill="white">箱号</text>
    
    <!-- ISO码区域标识 -->
    <rect x="15" y="70" width="35" height="22" rx="3" fill="rgba(246,211,101,0.4)" stroke="#f6ad55" stroke-width="1.5"/>
    <text x="32" y="85" text-anchor="middle" font-size="8" fill="white">ISO</text>
  </g>
  
  <!-- 前箱（20尺）- 纵向排列，靠下方，靠近车头（右侧） -->
  <g transform="translate(550, 370)">
    <rect x="0" y="0" width="180" height="100" rx="8" fill="url(#containerGrad2)" filter="url(#shadow)" opacity="0.9"/>
    <text x="90" y="40" text-anchor="middle" font-size="16" fill="white" font-weight="bold">20尺箱 B</text>
    <text x="90" y="62" text-anchor="middle" font-size="13" fill="white">（前箱）</text>
    <text x="90" y="82" text-anchor="middle" font-size="11" fill="white" font-style="italic">靠近车头</text>
    
    <!-- 箱号区域标识 -->
    <rect x="120" y="12" width="45" height="25" rx="3" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
    <text x="142" y="29" text-anchor="middle" font-size="9" fill="white">箱号</text>
    
    <!-- ISO码区域标识 -->
    <rect x="15" y="70" width="35" height="22" rx="3" fill="rgba(246,211,101,0.4)" stroke="#f6ad55" stroke-width="1.5"/>
    <text x="32" y="85" text-anchor="middle" font-size="8" fill="white">ISO</text>
  </g>
  
  <!-- 纵向排列示意 -->
  <g transform="translate(470, 362)">
    <line x1="0" y1="0" x2="0" y2="6" stroke="#4a5568" stroke-width="3"/>
    <text x="0" y="-8" text-anchor="middle" font-size="10" fill="#666">并排</text>
  </g>
  
  <!-- 车头（示意） - 在最右侧（出口） -->
  <g transform="translate(900, 280)">
    <rect x="0" y="0" width="60" height="120" rx="10" fill="#718096" filter="url(#shadow)"/>
    <text x="30" y="50" text-anchor="middle" font-size="12" fill="white" font-weight="bold">车头</text>
    <text x="30" y="75" text-anchor="middle" font-size="10" fill="white">（出口）</text>
    
    <!-- 车头窗户 -->
    <rect x="10" y="15" width="40" height="25" rx="3" fill="#a0aec0"/>
  </g>
  
  <!-- 侧壁相机 C3（左侧壁，拍摄后箱侧面，靠近车尾） -->
  <g transform="translate(260, 310)">
    <rect x="-20" y="-15" width="40" height="30" rx="5" fill="#f093fb" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C3</text>
    <text x="0" y="50" text-anchor="middle" font-size="11" fill="#f5576c">左侧壁</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#999">高度 1.5m</text>
    
    <!-- 拍摄范围指示（覆盖后箱） -->
    <path d="M 20,-5 L 130,-5" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <text x="75" y="-15" text-anchor="middle" font-size="9" fill="#f093fb">覆盖后箱</text>
  </g>
  
  <!-- 侧壁相机 C4（右侧壁，拍摄前箱侧面，靠近车头） -->
  <g transform="translate(980, 420)">
    <rect x="-20" y="-15" width="40" height="30" rx="5" fill="#f5576c" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C4</text>
    <text x="0" y="50" text-anchor="middle" font-size="11" fill="#f093fb">右侧壁</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#999">高度 1.5m</text>
    
    <!-- 拍摄范围指示（覆盖前箱） -->
    <path d="M -20,-5 L -130,-5" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
    <text x="-75" y="-15" text-anchor="middle" font-size="9" fill="#f5576c">覆盖前箱</text>
  </g>
  
  <!-- 行驶方向箭头（从左到右） -->
  <g transform="translate(200, 600)">
    <text x="0" y="-20" text-anchor="middle" font-size="14" fill="#666">行驶方向（从左到右）</text>
    <path d="M -80,0 L 120,0" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
    <polygon points="120,-10 140,0 120,10" fill="#667eea"/>
  </g>
  
  <!-- 入口/出口标注 -->
  <g transform="translate(320, 520)">
    <text x="0" y="0" text-anchor="middle" font-size="12" fill="#666" font-weight="bold">← 入口（车尾）</text>
  </g>
  <g transform="translate(930, 520)">
    <text x="0" y="0" text-anchor="middle" font-size="12" fill="#666" font-weight="bold">出口（车头）→</text>
  </g>
  
  <!-- 尺寸标注 - 单个箱子长度 -->
  <g transform="translate(370, 485)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#999" stroke-width="1"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#999" stroke-width="1"/>
    <line x1="180" y1="-5" x2="180" y2="5" stroke="#999" stroke-width="1"/>
    <text x="90" y="20" text-anchor="middle" font-size="10" fill="#666">6m（20尺）</text>
  </g>
  
  <!-- 总长度标注（纵向排列） -->
  <g transform="translate(370, 230)">
    <line x1="0" y1="0" x2="180" y2="0" stroke="#999" stroke-width="1"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#999" stroke-width="1"/>
    <line x1="180" y1="-5" x2="180" y2="5" stroke="#999" stroke-width="1"/>
    <text x="90" y="-12" text-anchor="middle" font-size="10" fill="#666">总宽约5m（含间隙）</text>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(50, 700)">
    <rect x="0" y="0" width="200" height="135" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="100" y="25" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">图例说明</text>
    
    <circle cx="30" cy="50" r="10" fill="url(#sideGrad)"/>
    <text x="50" y="55" font-size="11" fill="#333">顶部相机（C5/C6）</text>
    
    <rect x="20" y="70" width="20" height="15" rx="3" fill="#f093fb"/>
    <text x="50" y="82" font-size="11" fill="#333">侧壁相机（C3/C4）</text>
    
    <circle cx="30" cy="105" r="10" fill="url(#auxGrad)" stroke="#f6ad55" stroke-width="2"/>
    <text x="50" y="110" font-size="11" fill="#333">辅助相机（C7）</text>
  </g>
  
  <!-- 相机配置参数面板（5个相机） -->
  <g transform="translate(270, 700)">
    <rect x="0" y="0" width="320" height="135" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="160" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">📷 相机配置参数（5个基础+1辅助）</text>
    
    <text x="10" y="42" font-size="10" fill="#666">• C5: 道闸前上方 8-10m, 2.8mm → 车尾+后箱</text>
    <text x="10" y="58" font-size="10" fill="#666">• C6: 道闸后上方 8-10m, 2.8mm → 前箱+车头</text>
    <text x="10" y="74" font-size="10" fill="#666">• C3: 左侧壁 1.5m, 6-8mm → 后箱OCR（靠近车尾）</text>
    <text x="10" y="90" font-size="10" fill="#666">• C4: 右侧壁 1.5m, 6-8mm → 前箱OCR（靠近车头）</text>
    <text x="10" y="106" font-size="10" fill="#dd6b20" font-weight="bold">• C7: 前侧方 3-4m, 6mm, 45°★辅助 → ISO码+锁杆</text>
    <text x="10" y="122" font-size="9" fill="#999">注：纵向双20尺箱，总长约12m（6m×2）</text>
  </g>
  
  <!-- 优势说明面板 -->
  <g transform="translate(605, 700)">
    <rect x="0" y="0" width="280" height="135" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="140" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">✨ C7辅助相机优势</text>
    
    <text x="15" y="45" font-size="11" fill="#333" font-weight="bold">🎯 动态触发C7</text>
    <text x="30" y="60" font-size="10" fill="#666">按需唤醒，低置信度/异常时自动启动</text>
    
    <text x="15" y="80" font-size="11" fill="#333" font-weight="bold">📋 ISO码识别</text>
    <text x="30" y="95" font-size="10" fill="#666">45°角精准捕捉双箱ISO代码和锁杆</text>
    
    <text x="15" y="115" font-size="11" fill="#333" font-weight="bold">🔧 侧面污损备用</text>
    <text x="30" y="130" font-size="10" fill="#666">C3/C4拍摄不清时，C7提供辅助视角</text>
  </g>
  
  <!-- 5.5摄像头标识 -->
  <g transform="translate(900, 700)">
    <rect x="0" y="0" width="250" height="135" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="125" y="22" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">5.5摄像头配置说明</text>
    
    <text x="15" y="45" font-size="10" fill="#666">• 5基础相机：C3/C4/C5/C6 + 预留</text>
    <text x="15" y="62" font-size="10" fill="#dd6b20" font-weight="bold">• 0.5辅助：C7（动态触发）</text>
    <text x="15" y="79" font-size="10" fill="#666">• 平时运行：C3/C4/C5/C6（4路）</text>
    <text x="15" y="96" font-size="10" fill="#666">• 异常触发：+C7（5路同时）</text>
    <text x="15" y="118" font-size="10" fill="#666">安装：道闸前后立柱（非龙门架）</text>
  </g>
</svg>
