<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#718096;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5568;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    侧壁安装模式部署示意图
  </text>
  <text x="600" y="65" text-anchor="middle" font-size="14" fill="#666">
    （5摄像头配置 - 道闸前后安装，车道宽 3.5m）
  </text>
  
  <!-- 道闸前立柱（左侧） -->
  <g transform="translate(0, 100)">
    <rect x="280" y="0" width="20" height="400" fill="url(#poleGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- 道闸前立柱（右侧） -->
  <g transform="translate(0, 100)">
    <rect x="900" y="0" width="20" height="400" fill="url(#poleGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- 道闸后立柱（左侧） -->
  <g transform="translate(0, 100)">
    <rect x="520" y="0" width="20" height="400" fill="url(#poleGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- 道闸后立柱（右侧） -->
  <g transform="translate(0, 100)">
    <rect x="660" y="0" width="20" height="400" fill="url(#poleGrad)" filter="url(#shadow)"/>
  </g>
  
  <!-- 道闸横杆 -->
  <g transform="translate(0, 100)">
    <rect x="290" y="380" width="620" height="15" fill="#e53e3e" filter="url(#shadow)"/>
    <text x="600" y="450" text-anchor="middle" font-size="14" fill="#666">道闸栏杆</text>
  </g>
  
  <!-- 道闸标识 -->
  <g transform="translate(0, 85)">
    <text x="600" y="0" text-anchor="middle" font-size="13" fill="#666" font-weight="bold">道闸区域</text>
    <line x1="300" y1="10" x2="900" y2="10" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 道闸前上方相机 C5 -->
  <g transform="translate(290, 130)">
    <circle cx="0" cy="0" r="28" fill="url(#sideGrad)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="13" fill="white" font-weight="bold">C5</text>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#667eea">道闸前上方</text>
    <text x="0" y="60" text-anchor="middle" font-size="10" fill="#999">高度 8-10m</text>
    
    <!-- 视野范围（高角度俯拍） -->
    <path d="M -30,25 L -100,320 L 100,320 L 30,25 Z" fill="rgba(102,126,234,0.15)" stroke="#667eea" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 道闸后上方相机 C6 -->
  <g transform="translate(910, 130)">
    <circle cx="0" cy="0" r="28" fill="url(#sideGrad)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="13" fill="white" font-weight="bold">C6</text>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#764ba2">道闸后上方</text>
    <text x="0" y="60" text-anchor="middle" font-size="10" fill="#999">高度 8-10m</text>
    
    <!-- 视野范围（高角度俯拍） -->
    <path d="M -30,25 L -100,320 L 100,320 L 30,25 Z" fill="rgba(118,75,162,0.15)" stroke="#764ba2" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 车道边界 -->
  <g transform="translate(0, 200)">
    <rect x="300" y="0" width="600" height="350" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="600" y="-15" text-anchor="middle" font-size="13" fill="#666">车道宽度 3.5m</text>
  </g>
  
  <!-- 左侧集装箱（20 尺） -->
  <g transform="translate(380, 260)">
    <rect x="0" y="0" width="240" height="180" rx="8" fill="url(#containerGrad)" filter="url(#shadow)" opacity="0.9"/>
    <text x="120" y="50" text-anchor="middle" font-size="16" fill="white" font-weight="bold">20 尺箱 A</text>
    <text x="120" y="75" text-anchor="middle" font-size="13" fill="white">（左箱）</text>
    <text x="120" y="110" text-anchor="middle" font-size="12" fill="white" font-style="italic">箱号侧面可见</text>
    
    <!-- 箱号区域标识 -->
    <rect x="170" y="20" width="50" height="40" rx="3" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
    <text x="195" y="45" text-anchor="middle" font-size="10" fill="white">箱号</text>
  </g>
  
  <!-- 右侧集装箱（20 尺） -->
  <g transform="translate(580, 260)">
    <rect x="0" y="0" width="240" height="180" rx="8" fill="url(#containerGrad)" filter="url(#shadow)" opacity="0.9"/>
    <text x="120" y="50" text-anchor="middle" font-size="16" fill="white" font-weight="bold">20 尺箱 B</text>
    <text x="120" y="75" text-anchor="middle" font-size="13" fill="white">（右箱）</text>
    <text x="120" y="110" text-anchor="middle" font-size="12" fill="white" font-style="italic">箱号侧面可见</text>
    
    <!-- 箱号区域标识 -->
    <rect x="20" y="20" width="50" height="40" rx="3" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
    <text x="45" y="45" text-anchor="middle" font-size="10" fill="white">箱号</text>
  </g>
  
  <!-- 侧壁相机 C3（左侧） -->
  <g transform="translate(280, 520)">
    <rect x="-20" y="-15" width="40" height="30" rx="5" fill="#f093fb" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C3</text>
    <text x="0" y="50" text-anchor="middle" font-size="11" fill="#f5576c">左侧壁</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#999">高度 1.5m</text>
    
    <!-- 拍摄范围指示 -->
    <path d="M 20,-5 L 90,-5" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- 侧壁相机 C4（右侧） -->
  <g transform="translate(920, 520)">
    <rect x="-20" y="-15" width="40" height="30" rx="5" fill="#f5576c" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C4</text>
    <text x="0" y="50" text-anchor="middle" font-size="11" fill="#f093fb">右侧壁</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#999">高度 1.5m</text>
    
    <!-- 拍摄范围指示 -->
    <path d="M -20,-5 L -90,-5" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- 行驶方向箭头 -->
  <g transform="translate(200, 600)">
    <text x="0" y="-20" text-anchor="middle" font-size="14" fill="#666">车辆进入方向</text>
    <path d="M -80,0 L 80,0" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
    <polygon points="80,-10 100,0 80,10" fill="#667eea"/>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(50, 680)">
    <rect x="0" y="0" width="200" height="110" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="100" y="25" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">图例说明</text>
    
    <circle cx="30" cy="50" r="10" fill="url(#sideGrad)"/>
    <text x="50" y="55" font-size="11" fill="#333">顶部相机（C5/C6）</text>
    
    <rect x="20" y="70" width="20" height="15" rx="3" fill="#f093fb"/>
    <text x="50" y="82" font-size="11" fill="#333">侧壁相机（C3/C4）</text>
  </g>
  
  <!-- 技术参数标注 -->
  <g transform="translate(280, 680)">
    <rect x="0" y="0" width="300" height="110" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="150" y="25" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">相机配置参数</text>
    
    <text x="20" y="50" font-size="11" fill="#666">• C5/C6：道闸前后上方，高度 8-10m</text>
    <text x="20" y="70" font-size="11" fill="#666">• C5/C6：俯角 30-45°，拍摄车头/车尾</text>
    <text x="20" y="90" font-size="11" fill="#666">• C3/C4：侧壁安装，高度 1.5m，水平拍摄</text>
  </g>
  
  <!-- 5摄像头标识 -->
  <g transform="translate(600, 680)">
    <rect x="0" y="0" width="220" height="110" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="110" y="25" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">5摄像头配置</text>
    
    <text x="20" y="50" font-size="11" fill="#666">• C5：道闸前上方 → 车头+前半箱体</text>
    <text x="20" y="70" font-size="11" fill="#666">• C6：道闸后上方 → 车尾+后半箱体</text>
    <text x="20" y="90" font-size="11" fill="#666">• C3/C4：左右侧壁 → 箱号侧面</text>
  </g>
</svg>
