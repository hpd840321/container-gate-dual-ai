<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="dualBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="single20Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="single40Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1600" height="900" fill="#f7fafc"/>
  
  <!-- 标题栏 -->
  <g transform="translate(0, 0)">
    <rect width="1400" height="80" fill="url(#headerGrad)"/>
    <text x="700" y="35" text-anchor="middle" font-size="24" fill="white" font-weight="bold">
      三场景识别对比示意图
    </text>
    <text x="800" y="60" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">
      Three Loading Scenarios Comparison - Top Camera View
    </text>
  </g>
  
  <!-- ==================== 场景一：双 20 尺柜 ==================== -->
  <g transform="translate(25, 120)">
    <!-- 卡片背景 -->
    <rect x="0" y="0" width="430" height="480" rx="12" fill="white" stroke="#f5576c" stroke-width="2.5" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <rect x="0" y="0" width="430" height="50" rx="12" fill="url(#dualBoxGrad)"/>
    <text x="215" y="32" text-anchor="middle" font-size="18" fill="white" font-weight="bold">场景一：双 20 尺柜</text>
    
    <!-- 顶部相机视野 -->
    <g transform="translate(25, 80)">
      <!-- C5 视野 -->
      <rect x="0" y="0" width="160" height="280" fill="rgba(240,147,251,0.15)" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="80" y="-15" text-anchor="middle" font-size="12" fill="#f093fb" font-weight="bold">C5 视野</text>
      
      <!-- C6 视野 -->
      <rect x="195" y="0" width="160" height="280" fill="rgba(245,87,108,0.15)" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="275" y="-15" text-anchor="middle" font-size="12" fill="#f5576c" font-weight="bold">C6 视野</text>
      
      <!-- 左箱（20 尺） -->
      <rect x="15" y="40" width="130" height="200" rx="8" fill="url(#single20Grad)" filter="url(#shadow)" opacity="0.9"/>
      <text x="80" y="90" text-anchor="middle" font-size="13" fill="#1a535c" font-weight="bold">20 尺箱 A</text>
      <text x="80" y="115" text-anchor="middle" font-size="11" fill="#1a535c">（左箱）</text>
      <rect x="110" y="50" width="30" height="25" rx="3" fill="rgba(255,255,255,0.4)" stroke="white" stroke-width="2"/>
      <text x="125" y="67" text-anchor="middle" font-size="8" fill="#1a535c">箱号</text>
      
      <!-- 右箱（20 尺） -->
      <rect x="210" y="40" width="130" height="200" rx="8" fill="url(#single20Grad)" filter="url(#shadow)" opacity="0.9"/>
      <text x="275" y="90" text-anchor="middle" font-size="13" fill="#1a535c" font-weight="bold">20 尺箱 B</text>
      <text x="275" y="115" text-anchor="middle" font-size="11" fill="#1a535c">（右箱）</text>
      <rect x="220" y="50" width="30" height="25" rx="3" fill="rgba(255,255,255,0.4)" stroke="white" stroke-width="2"/>
      <text x="235" y="67" text-anchor="middle" font-size="8" fill="#1a535c">箱号</text>
    </g>
    
    <!-- 特征说明 -->
    <g transform="translate(25, 380)">
      <text x="0" y="0" font-size="13" fill="#333" font-weight="bold">检测特征：</text>
      <text x="15" y="25" font-size="11" fill="#666">• AI 检测到两个独立箱体边界框</text>
      <text x="15" y="45" font-size="11" fill="#666">• 两箱间隙通常&gt;30cm</text>
      <text x="15" y="65" font-size="11" fill="#666">• C5 和 C6 各拍摄到一个完整箱体</text>
      <text x="15" y="85" font-size="11" fill="#666">• 通过角点特征判断箱门朝向</text>
    </g>
  </g>
  
  <!-- ==================== 场景二：单 20 尺柜 ==================== -->
  <g transform="translate(485, 120)">
    <!-- 卡片背景 -->
    <rect x="0" y="0" width="430" height="480" rx="12" fill="white" stroke="#00f2fe" stroke-width="2.5" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <rect x="0" y="0" width="430" height="50" rx="12" fill="url(#single20Grad)"/>
    <text x="215" y="32" text-anchor="middle" font-size="18" fill="white" font-weight="bold">场景二：单 20 尺柜</text>
    
    <!-- 顶部相机视野 -->
    <g transform="translate(25, 80)">
      <!-- C5 视野 -->
      <rect x="0" y="0" width="160" height="280" fill="rgba(79,172,254,0.15)" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="80" y="-15" text-anchor="middle" font-size="12" fill="#4facfe" font-weight="bold">C5 视野</text>
      
      <!-- C6 视野 -->
      <rect x="195" y="0" width="160" height="280" fill="rgba(0,242,254,0.15)" stroke="#00f2fe" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="275" y="-15" text-anchor="middle" font-size="12" fill="#00f2fe" font-weight="bold">C6 视野</text>
      
      <!-- 单个集装箱（20 尺，偏左） -->
      <rect x="50" y="60" width="130" height="180" rx="8" fill="url(#single20Grad)" filter="url(#shadow)" opacity="0.95"/>
      <text x="115" y="110" text-anchor="middle" font-size="13" fill="#1a535c" font-weight="bold">20 尺箱</text>
      <text x="115" y="135" text-anchor="middle" font-size="11" fill="#1a535c">（中心偏左）</text>
      <rect x="145" y="70" width="30" height="25" rx="3" fill="rgba(255,255,255,0.4)" stroke="white" stroke-width="2"/>
      <text x="160" y="87" text-anchor="middle" font-size="8" fill="#1a535c">箱号</text>
      
      <!-- 中心线标识 -->
      <line x1="177" y1="0" x2="177" y2="280" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="182" y="270" text-anchor="start" font-size="9" fill="#a0aec0">车道中心线</text>
    </g>
    
    <!-- 特征说明 -->
    <g transform="translate(25, 380)">
      <text x="0" y="0" font-size="13" fill="#333" font-weight="bold">检测特征：</text>
      <text x="15" y="25" font-size="11" fill="#666">• AI 检测到一个独立箱体边界框</text>
      <text x="15" y="45" font-size="11" fill="#666">• 箱体长度约 6 米（像素换算）</text>
      <text x="15" y="65" font-size="11" fill="#666">• 根据中心线偏向选择主用相机</text>
      <text x="15" y="85" font-size="11" fill="#666">• 动态选择 C3 或 C4 进行识别</text>
    </g>
  </g>
  
  <!-- ==================== 场景三：单 40 尺柜 ==================== -->
  <g transform="translate(945, 120)">
    <!-- 卡片背景 -->
    <rect x="0" y="0" width="430" height="480" rx="12" fill="white" stroke="#38f9d7" stroke-width="2.5" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <rect x="0" y="0" width="430" height="50" rx="12" fill="url(#single40Grad)"/>
    <text x="215" y="32" text-anchor="middle" font-size="18" fill="white" font-weight="bold">场景三：单 40 尺柜</text>
    
    <!-- 顶部相机视野 -->
    <g transform="translate(25, 80)">
      <!-- C5 视野 -->
      <rect x="0" y="0" width="160" height="280" fill="rgba(67,233,123,0.15)" stroke="#43e97b" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="80" y="-15" text-anchor="middle" font-size="12" fill="#43e97b" font-weight="bold">C5 视野</text>
      
      <!-- C6 视野 -->
      <rect x="195" y="0" width="160" height="280" fill="rgba(56,249,215,0.15)" stroke="#38f9d7" stroke-width="2" stroke-dasharray="5,5"/>
      <text x="275" y="-15" text-anchor="middle" font-size="12" fill="#38f9d7" font-weight="bold">C6 视野</text>
      
      <!-- 单个集装箱（40 尺，跨视野） -->
      <rect x="30" y="50" width="295" height="190" rx="8" fill="url(#single40Grad)" filter="url(#shadow)" opacity="0.95"/>
      <text x="177" y="110" text-anchor="middle" font-size="14" fill="#1a535c" font-weight="bold">40 尺箱（约 12 米）</text>
      <text x="177" y="140" text-anchor="middle" font-size="12" fill="#1a535c">横跨 C5 和 C6 视场</text>
      
      <!-- 箱号区域（通常在右侧） -->
      <rect x="255" y="60" width="60" height="40" rx="4" fill="rgba(255,255,255,0.4)" stroke="white" stroke-width="2"/>
      <text x="285" y="85" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号区</text>
      
      <!-- 关联标识 -->
      <path d="M 90,20 L 90,5 M 265,20 L 265,5" stroke="#1a535c" stroke-width="2"/>
      <line x1="90" y1="5" x2="265" y2="5" stroke="#1a535c" stroke-width="2" marker-end="url(#arrowBlue)" marker-start="url(#arrowBlue)"/>
      <text x="177" y="-5" text-anchor="middle" font-size="10" fill="#1a535c">AI 特征关联融合</text>
    </g>
    
    <!-- 特征说明 -->
    <g transform="translate(25, 380)">
      <text x="0" y="0" font-size="13" fill="#333" font-weight="bold">检测特征：</text>
      <text x="15" y="25" font-size="11" fill="#666">• AI 可能分别在两图中检测到部分箱体</text>
      <text x="15" y="45" font-size="11" fill="#666">• 后端通过特征关联融合为一个长箱</text>
      <text x="15" y="65" font-size="11" fill="#666">• 箱体长度约 12 米（像素换算）</text>
      <text x="15" y="85" font-size="11" fill="#666">• 箱号通常在右侧（靠近箱门端）</text>
    </g>
  </g>
  
  <!-- ==================== 底部对比表格 ==================== -->
  <g transform="translate(25, 630)">
    <rect x="0" y="0" width="1350" height="240" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- 表头 -->
    <rect x="0" y="0" width="1350" height="45" rx="12" fill="url(#headerGrad)"/>
    <text x="675" y="30" text-anchor="middle" font-size="16" fill="white" font-weight="bold">三种场景关键参数对比</text>
    
    <!-- 表头列名 -->
    <text x="90" y="75" font-size="12" fill="#333" font-weight="bold">对比维度</text>
    <text x="360" y="75" font-size="12" fill="#f5576c" font-weight="bold">双 20 尺柜</text>
    <text x="720" y="75" font-size="12" fill="#00f2fe" font-weight="bold">单 20 尺柜</text>
    <text x="1080" y="75" font-size="12" fill="#38f9d7" font-weight="bold">单 40 尺柜</text>
    
    <!-- 分隔线 -->
    <line x1="40" y1="85" x2="1310" y2="85" stroke="#cbd5e0" stroke-width="2"/>
    
    <!-- 行 1：箱体数量 -->
    <text x="90" y="115" font-size="11" fill="#333" font-weight="bold">检测到箱体数量</text>
    <text x="360" y="115" font-size="11" fill="#666">两个独立箱体</text>
    <text x="720" y="115" font-size="11" fill="#666">一个独立箱体</text>
    <text x="1080" y="115" font-size="11" fill="#666">一个长箱体（跨视野）</text>
    <line x1="40" y1="125" x2="1310" y2="125" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- 行 2：箱体长度 -->
    <text x="90" y="155" font-size="11" fill="#333" font-weight="bold">计算长度</text>
    <text x="360" y="155" font-size="11" fill="#666">每个约 6 米</text>
    <text x="720" y="155" font-size="11" fill="#666">约 6 米</text>
    <text x="1080" y="155" font-size="11" fill="#666">约 12 米</text>
    <line x1="40" y1="165" x2="1310" y2="165" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- 行 3：相机选择策略 -->
    <text x="90" y="195" font-size="11" fill="#333" font-weight="bold">侧壁相机选择</text>
    <text x="360" y="195" font-size="11" fill="#666">根据箱号位置</text>
    <text x="720" y="195" font-size="11" fill="#666">根据中心线偏向</text>
    <text x="1080" y="195" font-size="11" fill="#666">通常选择右侧相机</text>
    <line x1="40" y1="205" x2="1310" y2="205" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- 行 4：识别率目标 -->
    <text x="90" y="235" font-size="11" fill="#333" font-weight="bold">识别率目标</text>
    <text x="360" y="235" font-size="11" fill="#f5576c" font-weight="bold">≥98%</text>
    <text x="720" y="235" font-size="11" fill="#00f2fe" font-weight="bold">≥99.5%</text>
    <text x="1080" y="235" font-size="11" fill="#38f9d7" font-weight="bold">≥99.5%</text>
    <line x1="40" y1="245" x2="1310" y2="245" stroke="#e2e8f0" stroke-width="1"/>
    
    <!-- 行 5：处理复杂度 -->
    <text x="90" y="275" font-size="11" fill="#333" font-weight="bold">处理复杂度</text>
    <text x="360" y="275" font-size="11" fill="#666">高（需分离双箱）</text>
    <text x="720" y="275" font-size="11" fill="#666">中（标准流程）</text>
    <text x="1080" y="275" font-size="11" fill="#666">中高（需特征融合）</text>
  </g>
</svg>
