<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stage1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stage2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stage3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stage4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="assistGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffa940;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc53d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <rect width="1200" height="1450" fill="#f7fafc"/>
  
  <!-- 标题栏 -->
  <rect width="1200" height="80" fill="url(#headerGrad)"/>
  <text x="600" y="35" text-anchor="middle" font-size="24" fill="white" font-weight="bold">
    5.5摄像头AI视觉检测流程 V4.5
  </text>
  <text x="600" y="60" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">
    行驶方向：从左到右 | 车尾→后箱→前箱→车头 | 5基础相机(C5+C6+C3+C4) + 1辅助相机(C7)
  </text>
  
  <!-- 阶段1: 实时检测 -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="1100" height="180" rx="12" fill="white" stroke="#4facfe" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1100" height="40" rx="12" fill="url(#stage1Grad)"/>
    <text x="550" y="28" text-anchor="middle" font-size="16" fill="white" font-weight="bold">阶段一：实时视频流检测（C5道闸前拍入口侧 + C6道闸后拍出口侧）</text>
    
    <g transform="translate(30, 55)">
      <rect x="0" y="0" width="200" height="105" rx="8" fill="#e6f7ff" stroke="#4facfe" stroke-width="2"/>
      <text x="100" y="30" text-anchor="middle" font-size="12" fill="#0066cc" font-weight="bold">C5+C6实时检测</text>
      <text x="100" y="50" text-anchor="middle" font-size="11" fill="#333">C5: 车尾+后箱(入口侧)</text>
      <text x="100" y="68" text-anchor="middle" font-size="11" fill="#333">C6: 前箱+车头(出口侧)</text>
      <text x="100" y="85" text-anchor="middle" font-size="10" fill="#666">8-10m高度 25-30 FPS</text>
      
      <path d="M 200,52 L 230,52" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="230" y="0" width="200" height="105" rx="8" fill="#e6f7ff" stroke="#4facfe" stroke-width="2"/>
      <text x="330" y="30" text-anchor="middle" font-size="12" fill="#0066cc" font-weight="bold">AI目标检测</text>
      <text x="330" y="50" text-anchor="middle" font-size="11" fill="#333">车辆+双箱定位</text>
      <text x="330" y="70" text-anchor="middle" font-size="10" fill="#666">后箱/前箱判定</text>
      <text x="330" y="88" text-anchor="middle" font-size="10" fill="#666">空车/载重判断</text>
      <text x="330" y="102" text-anchor="middle" font-size="10" fill="#666">&lt; 50ms</text>
      
      <path d="M 430,52 L 460,52" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="460" y="0" width="200" height="105" rx="8" fill="#e6f7ff" stroke="#4facfe" stroke-width="2"/>
      <text x="560" y="30" text-anchor="middle" font-size="12" fill="#0066cc" font-weight="bold">DeepSORT跟踪</text>
      <text x="560" y="50" text-anchor="middle" font-size="11" fill="#333">轨迹跟踪</text>
      <text x="560" y="70" text-anchor="middle" font-size="10" fill="#666">纵向排列双箱?</text>
      <text x="560" y="88" text-anchor="middle" font-size="10" fill="#666">进入最佳位置?</text>
      <text x="560" y="106" text-anchor="middle" font-size="10" fill="#0066cc" font-weight="bold">触发阶段二</text>
      
      <path d="M 660,52 L 690,52" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="690" y="0" width="180" height="105" rx="8" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
      <text x="780" y="30" text-anchor="middle" font-size="12" fill="#389e0d" font-weight="bold">空车判断</text>
      <text x="780" y="55" text-anchor="middle" font-size="11" fill="#333">空车→快速放行</text>
      <text x="780" y="75" text-anchor="middle" font-size="10" fill="#333">载重→进入识别</text>
      
      <path d="M 870,52 L 900,52" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="900" y="0" width="170" height="105" rx="8" fill="#e6f7ff" stroke="#4facfe" stroke-width="2"/>
      <text x="985" y="30" text-anchor="middle" font-size="12" fill="#0066cc" font-weight="bold">载重进入</text>
      <text x="985" y="55" text-anchor="middle" font-size="11" fill="#333">保存关键帧</text>
      <text x="985" y="75" text-anchor="middle" font-size="10" fill="#333">进入阶段二</text>
    </g>
  </g>
  
  <!-- 阶段2: 箱体分析 -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="1100" height="220" rx="12" fill="white" stroke="#f5576c" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1100" height="40" rx="12" fill="url(#stage2Grad)"/>
    <text x="550" y="28" text-anchor="middle" font-size="16" fill="white" font-weight="bold">阶段二：箱体分析（区分后箱入口侧 + 前箱出口侧 + 六面拆解）</text>
    
    <g transform="translate(30, 55)">
      <text x="0" y="0" font-size="13" fill="#333" font-weight="bold">基础分析（C5+C6）</text>
      <rect x="0" y="10" width="320" height="140" rx="8" fill="#fff2f0" stroke="#ff4d4f" stroke-width="2"/>
      <text x="160" y="40" text-anchor="middle" font-size="11" fill="#cf1322" font-weight="bold">五基础相机分析</text>
      <text x="20" y="65" font-size="10" fill="#333">• C5+C6: 箱体3D位姿估计</text>
      <text x="20" y="85" font-size="10" fill="#333">• C5+C6: 角件定位（8角点）</text>
      <text x="20" y="105" font-size="10" fill="#333">• C5: 后箱(入口侧) | C6: 前箱(出口侧)</text>
      <text x="20" y="125" font-size="10" fill="#333">• C5+C6: 箱门朝向判断</text>
      <text x="20" y="145" font-size="10" fill="#333">• C3: 后箱侧面 | C4: 前箱侧面</text>
      
      <path d="M 320,80 L 360,80" stroke="#ff4d4f" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="360" y="10" width="320" height="140" rx="8" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
      <text x="520" y="40" text-anchor="middle" font-size="11" fill="#531dab" font-weight="bold">C7辅助相机决策</text>
      <text x="380" y="65" font-size="10" fill="#333">触发条件:</text>
      <text x="380" y="85" font-size="10" fill="#666">• 侧面OCR置信度 &lt; 95%</text>
      <text x="380" y="105" font-size="10" fill="#666">• 夜间/低光照环境</text>
      <text x="380" y="125" font-size="10" fill="#666">• 侧面图像质量差（污损）</text>
      <text x="380" y="145" font-size="10" fill="#666">• 需要ISO码识别任务</text>
      
      <path d="M 680,80 L 720,80" stroke="#722ed1" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="720" y="10" width="340" height="140" rx="8" fill="#fff7e6" stroke="#ffa940" stroke-width="2"/>
      <text x="890" y="35" text-anchor="middle" font-size="12" fill="#d46b08" font-weight="bold">★ C7辅助相机（按需触发）</text>
      <text x="740" y="60" font-size="10" fill="#333">位置: 前侧方 3-4m, 45°角</text>
      <text x="740" y="80" font-size="10" fill="#333">价值①: ISO码识别（22G1/45R1）</text>
      <text x="740" y="100" font-size="10" fill="#333">价值②: 锁杆状态检测</text>
      <text x="740" y="120" font-size="10" fill="#333">价值③: 侧面污损备用识别</text>
      <text x="740" y="140" font-size="10" fill="#52c41a" font-weight="bold">动态触发，非始终启用</text>
    </g>
  </g>
  
  <!-- 阶段3: 按需触发 -->
  <g transform="translate(50, 540)">
    <rect x="0" y="0" width="1100" height="200" rx="12" fill="white" stroke="#52c41a" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1100" height="40" rx="12" fill="url(#stage3Grad)"/>
    <text x="550" y="28" text-anchor="middle" font-size="16" fill="white" font-weight="bold">阶段三：按需相机触发（5基础 + C7按需）</text>
    
    <g transform="translate(30, 55)">
      <text x="0" y="0" font-size="13" fill="#333" font-weight="bold">基础触发（始终启用）</text>
      <rect x="0" y="10" width="480" height="120" rx="8" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
      
      <g transform="translate(20, 30)">
        <circle cx="30" cy="20" r="20" fill="#f093fb"/>
        <text x="30" y="25" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C5</text>
        <text x="30" y="55" text-anchor="middle" font-size="9" fill="#333">道闸前</text>
      </g>
      
      <g transform="translate(100, 30)">
        <circle cx="30" cy="20" r="20" fill="#ff6b6b"/>
        <text x="30" y="25" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C6</text>
        <text x="30" y="55" text-anchor="middle" font-size="9" fill="#333">道闸后</text>
      </g>
      
      <g transform="translate(180, 30)">
        <rect x="10" y="0" width="40" height="35" rx="5" fill="#4facfe"/>
        <text x="30" y="23" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C3</text>
        <text x="30" y="55" text-anchor="middle" font-size="9" fill="#333">后箱侧面</text>
      </g>
      
      <g transform="translate(260, 30)">
        <rect x="10" y="0" width="40" height="35" rx="5" fill="#00f2fe"/>
        <text x="30" y="23" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C4</text>
        <text x="30" y="55" text-anchor="middle" font-size="9" fill="#333">前箱侧面</text>
      </g>
      
      <text x="350" y="40" font-size="10" fill="#333">→ 4基础相机始终触发</text>
      <text x="350" y="60" font-size="10" fill="#666">C5:车尾+后箱 | C6:前箱+车头</text>
      <text x="350" y="80" font-size="10" fill="#666">C3:后箱侧面 | C4:前箱侧面</text>
      
      <path d="M 480,70 L 520,70" stroke="#52c41a" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="520" y="10" width="280" height="120" rx="8" fill="#fff7e6" stroke="#ffa940" stroke-width="3"/>
      <text x="660" y="35" text-anchor="middle" font-size="12" fill="#d46b08" font-weight="bold">★ C7辅助相机（按需触发）</text>
      <text x="540" y="60" font-size="10" fill="#333">触发条件:</text>
      <text x="540" y="80" font-size="10" fill="#666">• OCR置信度 &lt; 95%</text>
      <text x="540" y="100" font-size="10" fill="#666">• 侧面污损/夜间</text>
      <text x="540" y="120" font-size="10" fill="#52c41a" font-weight="bold">平时休眠，异常时自动唤醒</text>
      
      <path d="M 800,70 L 840,70" stroke="#ffa940" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="840" y="10" width="230" height="120" rx="8" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
      <text x="955" y="35" text-anchor="middle" font-size="12" fill="#096dd9" font-weight="bold">图像采集结果</text>
      <text x="955" y="60" text-anchor="middle" font-size="10" fill="#333">4-5张高清图像</text>
      <text x="955" y="80" text-anchor="middle" font-size="10" fill="#333">时间戳同步</text>
      <text x="955" y="100" text-anchor="middle" font-size="10" fill="#333">车辆ID绑定</text>
    </g>
  </g>
  
  <!-- 阶段4: OCR识别 -->
  <g transform="translate(50, 760)">
    <rect x="0" y="0" width="1100" height="220" rx="12" fill="white" stroke="#fa8c16" stroke-width="3" filter="url(#shadow)"/>
    <rect x="0" y="0" width="1100" height="40" rx="12" fill="url(#stage4Grad)"/>
    <text x="550" y="28" text-anchor="middle" font-size="16" fill="white" font-weight="bold">阶段四：多任务OCR识别（C3后箱+C4前箱主力 + C7备用）</text>
    
    <g transform="translate(30, 55)">
      <text x="0" y="0" font-size="13" fill="#333" font-weight="bold">主力识别任务（C3后箱+C4前箱）</text>
      
      <rect x="0" y="10" width="140" height="130" rx="8" fill="#e6f7ff" stroke="#1890ff" stroke-width="2"/>
      <text x="70" y="35" text-anchor="middle" font-size="11" fill="#096dd9" font-weight="bold">C3+C4</text>
      <text x="70" y="60" text-anchor="middle" font-size="10" fill="#333">主力OCR</text>
      <text x="70" y="80" text-anchor="middle" font-size="10" fill="#666">后箱/前箱箱号</text>
      <text x="70" y="100" text-anchor="middle" font-size="10" fill="#666">识别率: 98%</text>
      <text x="70" y="125" text-anchor="middle" font-size="9" fill="#52c41a">置信度评估</text>
      
      <g transform="translate(150, 75)">
        <path d="M 0,0 L 30,0" stroke="#1890ff" stroke-width="2"/>
        <text x="15" y="-10" text-anchor="middle" font-size="9" fill="#1890ff">≥95%</text>
        <path d="M 30,0 L 30,-30 L 60,-30" stroke="#52c41a" stroke-width="2" marker-end="url(#arrowBlue)"/>
        
        <text x="15" y="15" text-anchor="middle" font-size="9" fill="#ff4d4f">&lt;95%</text>
        <path d="M 30,0 L 30,30 L 60,30" stroke="#ff4d4f" stroke-width="2" marker-end="url(#arrowBlue)"/>
      </g>
      
      <rect x="220" y="-25" width="140" height="80" rx="8" fill="#f6ffed" stroke="#52c41a" stroke-width="2"/>
      <text x="290" y="5" text-anchor="middle" font-size="11" fill="#389e0d" font-weight="bold">正常输出</text>
      <text x="290" y="25" text-anchor="middle" font-size="10" fill="#333">C3+C4结果</text>
      <text x="290" y="45" text-anchor="middle" font-size="10" fill="#333">直接输出</text>
      
      <rect x="220" y="65" width="140" height="80" rx="8" fill="#fff7e6" stroke="#ffa940" stroke-width="2"/>
      <text x="290" y="95" text-anchor="middle" font-size="11" fill="#d46b08" font-weight="bold">触发C7备用</text>
      <text x="290" y="115" text-anchor="middle" font-size="10" fill="#333">C7辅助识别</text>
      <text x="290" y="135" text-anchor="middle" font-size="10" fill="#333">多视角融合</text>
      
      <path d="M 360,25 L 400,25" stroke="#52c41a" stroke-width="2" marker-end="url(#arrowBlue)"/>
      <path d="M 360,105 L 400,105" stroke="#ffa940" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="400" y="10" width="160" height="130" rx="8" fill="#fff7e6" stroke="#ffa940" stroke-width="2"/>
      <text x="480" y="35" text-anchor="middle" font-size="11" fill="#d46b08" font-weight="bold">C7辅助任务</text>
      <text x="480" y="60" text-anchor="middle" font-size="10" fill="#333">ISO码识别</text>
      <text x="480" y="80" text-anchor="middle" font-size="10" fill="#333">锁杆检测</text>
      <text x="480" y="100" text-anchor="middle" font-size="10" fill="#333">备用箱号识别</text>
      <text x="480" y="125" text-anchor="middle" font-size="9" fill="#52c41a">提升率: +1.2%</text>
      
      <path d="M 560,75 L 600,75" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <rect x="600" y="10" width="180" height="130" rx="8" fill="#f9f0ff" stroke="#722ed1" stroke-width="2"/>
      <text x="690" y="35" text-anchor="middle" font-size="12" fill="#531dab" font-weight="bold">多任务融合</text>
      <text x="690" y="60" text-anchor="middle" font-size="10" fill="#333">箱号+ISO+箱主</text>
      <text x="690" y="80" text-anchor="middle" font-size="10" fill="#333">置信度投票</text>
      <text x="690" y="105" text-anchor="middle" font-size="11" fill="#52c41a" font-weight="bold">综合识别率</text>
      <text x="690" y="125" text-anchor="middle" font-size="12" fill="#52c41a" font-weight="bold">99.2%</text>
    </g>
  </g>
  
  <!-- 阶段5: 输出 -->
  <g transform="translate(50, 1000)">
    <rect x="0" y="0" width="1100" height="90" rx="12" fill="#52c41a" opacity="0.1" stroke="#52c41a" stroke-width="3" filter="url(#shadow)"/>
    <text x="550" y="35" text-anchor="middle" font-size="18" fill="#389e0d" font-weight="bold">阶段五：结果输出与上传</text>
    
    <g transform="translate(150, 55)">
      <rect x="0" y="0" width="180" height="30" rx="6" fill="white" stroke="#52c41a" stroke-width="2"/>
      <text x="90" y="20" text-anchor="middle" font-size="11" fill="#389e0d">箱号 + ISO类型</text>
    </g>
    
    <g transform="translate(360, 55)">
      <rect x="0" y="0" width="180" height="30" rx="6" fill="white" stroke="#52c41a" stroke-width="2"/>
      <text x="90" y="20" text-anchor="middle" font-size="11" fill="#389e0d">箱主 + 锁杆状态</text>
    </g>
    
    <g transform="translate(570, 55)">
      <rect x="0" y="0" width="180" height="30" rx="6" fill="white" stroke="#52c41a" stroke-width="2"/>
      <text x="90" y="20" text-anchor="middle" font-size="11" fill="#389e0d">识别照片 + 时间戳</text>
    </g>
    
    <g transform="translate(780, 55)">
      <rect x="0" y="0" width="180" height="30" rx="6" fill="#1890ff" stroke="#1890ff" stroke-width="2"/>
      <text x="90" y="20" text-anchor="middle" font-size="11" fill="white" font-weight="bold">上传TOS系统</text>
    </g>
    
    <path d="M 330,70 L 360,70" stroke="#52c41a" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <path d="M 540,70 L 570,70" stroke="#52c41a" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <path d="M 750,70 L 780,70" stroke="#52c41a" stroke-width="2" marker-end="url(#arrowBlue)"/>
  </g>
  
  <!-- 底部说明 -->
  <g transform="translate(50, 1110)">
    <rect x="0" y="0" width="1100" height="320" rx="12" fill="#f0f5ff" stroke="#2f54eb" stroke-width="1"/>
    <text x="550" y="30" text-anchor="middle" font-size="14" fill="#1d39c4" font-weight="bold">5.5摄像头方案核心特点（行驶方向：从左到右）</text>
    
    <g transform="translate(30, 55)">
      <text x="0" y="0" font-size="11" fill="#333" font-weight="bold">✓ 车辆结构（从左到右）:</text>
      <text x="150" y="0" font-size="11" fill="#666">车尾 → 后箱（入口侧）→ 前箱（出口侧）→ 车头</text>
      
