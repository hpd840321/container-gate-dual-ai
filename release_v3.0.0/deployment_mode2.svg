<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="dualBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="singleBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#fafbfc"/>
  
  <!-- 标题区域 -->
  <g transform="translate(0, 0)">
    <rect width="1200" height="70" fill="url(#headerGrad)"/>
    <text x="600" y="30" text-anchor="middle" font-size="22" fill="white" font-weight="bold">
      模式二：头尾安装部署示意图
    </text>
    <text x="600" y="52" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.9)">
      （俯视图 - 适用于两侧无安装空间场景）
    </text>
  </g>
  
  <!-- 龙门架顶部结构 -->
  <g transform="translate(100, 120)">
    <rect x="0" y="0" width="1000" height="70" rx="8" fill="white" stroke="#667eea" stroke-width="2" filter="url(#shadow)"/>
    <text x="500" y="28" text-anchor="middle" font-size="15" fill="#667eea" font-weight="bold">龙门架（高度 6 米）</text>
    
    <!-- 顶部相机 C5 -->
    <g transform="translate(250, 35)">
      <circle cx="0" cy="0" r="20" fill="#667eea"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C5</text>
    </g>
    
    <!-- 顶部相机 C6 -->
    <g transform="translate(750, 35)">
      <circle cx="0" cy="0" r="20" fill="#764ba2"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C6</text>
    </g>
  </g>
  
  <!-- 车道区域 -->
  <g transform="translate(200, 230)">
    <rect x="0" y="0" width="800" height="280" fill="#f0f2f5" stroke="#cbd5e0" stroke-width="2" rx="5"/>
    <text x="400" y="-15" text-anchor="middle" font-size="13" fill="#718096">车道宽度 3.5m</text>
    
    <!-- 左侧集装箱（20 尺） -->
    <g transform="translate(100, 40)">
      <rect x="0" y="0" width="260" height="200" rx="8" fill="url(#dualBoxGrad)" filter="url(#shadow)" opacity="0.95"/>
      <text x="130" y="60" text-anchor="middle" font-size="16" fill="#1a535c" font-weight="bold">20 尺箱 A（左箱）</text>
      <text x="130" y="90" text-anchor="middle" font-size="12" fill="#1a535c">箱号侧面可见</text>
      
      <!-- 箱号区域高亮 -->
      <rect x="190" y="20" width="55" height="45" rx="4" fill="rgba(255,255,255,0.4)" stroke="#38f9d7" stroke-width="2"/>
      <text x="218" y="48" text-anchor="middle" font-size="10" fill="#1a535c" font-weight="bold">箱号区</text>
    </g>
    
    <!-- 右侧集装箱（20 尺） -->
    <g transform="translate(440, 40)">
      <rect x="0" y="0" width="260" height="200" rx="8" fill="url(#dualBoxGrad)" filter="url(#shadow)" opacity="0.95"/>
      <text x="130" y="60" text-anchor="middle" font-size="16" fill="#1a535c" font-weight="bold">20 尺箱 B（右箱）</text>
      <text x="130" y="90" text-anchor="middle" font-size="12" fill="#1a535c">箱号侧面可见</text>
      
      <!-- 箱号区域高亮 -->
      <rect x="15" y="20" width="55" height="45" rx="4" fill="rgba(255,255,255,0.4)" stroke="#38f9d7" stroke-width="2"/>
      <text x="43" y="48" text-anchor="middle" font-size="10" fill="#1a535c" font-weight="bold">箱号区</text>
    </g>
  </g>
  
  <!-- 前向相机 C3 -->
  <g transform="translate(400, 560)">
    <rect x="-25" y="-18" width="50" height="36" rx="6" fill="url(#processGrad)" filter="url(#shadow)"/>
    <text x="0" y="7" text-anchor="middle" font-size="13" fill="white" font-weight="bold">C3</text>
    <text x="0" y="50" text-anchor="middle" font-size="12" fill="#f5576c" font-weight="bold">前向相机</text>
    <text x="0" y="70" text-anchor="middle" font-size="10" fill="#718096">高度 4m，俯角 30°</text>
    <text x="0" y="85" text-anchor="middle" font-size="10" fill="#718096">覆盖 0~8 米（前半部分）</text>
    
    <!-- 拍摄范围指示线 -->
    <path d="M 0,-18 L -150,-200" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowPink)"/>
    <path d="M 0,-18 L 150,-200" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowPink)"/>
  </g>
  
  <!-- 后向相机 C4 -->
  <g transform="translate(800, 560)">
    <rect x="-25" y="-18" width="50" height="36" rx="6" fill="url(#processGrad)" filter="url(#shadow)"/>
    <text x="0" y="7" text-anchor="middle" font-size="13" fill="white" font-weight="bold">C4</text>
    <text x="0" y="50" text-anchor="middle" font-size="12" fill="#f093fb" font-weight="bold">后向相机</text>
    <text x="0" y="70" text-anchor="middle" font-size="10" fill="#718096">高度 4m，俯角 30°</text>
    <text x="0" y="85" text-anchor="middle" font-size="10" fill="#718096">覆盖 8~16 米（后半部分）</text>
    
    <!-- 拍摄范围指示线 -->
    <path d="M 0,-18 L -150,-200" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowPink)"/>
    <path d="M 0,-18 L 150,-200" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowPink)"/>
  </g>
  
  <!-- 行驶方向 -->
  <g transform="translate(600, 680)">
    <text x="0" y="-15" text-anchor="middle" font-size="14" fill="#4a5568" font-weight="bold">行驶方向</text>
    <line x1="-120" y1="0" x2="120" y2="0" stroke="#667eea" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <polygon points="120,-12 140,0 120,12" fill="#667eea"/>
  </g>
  
  <!-- 图例说明 -->
  <g transform="translate(30, 720)">
    <rect x="0" y="0" width="280" height="70" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6"/>
    <text x="140" y="22" text-anchor="middle" font-size="12" fill="#2d3748" font-weight="bold">图例</text>
    
    <circle cx="40" cy="45" r="8" fill="#667eea"/>
    <text x="60" y="50" font-size="10" fill="#4a5568">顶部相机（C5/C6）</text>
    
    <rect x="130" y="37" width="16" height="16" rx="3" fill="url(#processGrad)"/>
    <text x="155" y="49" font-size="10" fill="#4a5568">前向/后向相机</text>
    
    <rect x="220" y="37" width="16" height="16" rx="3" fill="url(#dualBoxGrad)"/>
    <text x="245" y="49" font-size="10" fill="#4a5568">20 尺集装箱</text>
  </g>
  
  <!-- 覆盖逻辑说明 -->
  <g transform="translate(870, 720)">
    <rect x="0" y="0" width="300" height="70" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6"/>
    <text x="150" y="22" text-anchor="middle" font-size="12" fill="#2d3748" font-weight="bold">覆盖逻辑</text>
    
    <text x="20" y="45" font-size="10" fill="#4a5568">• C3：车辆前半部分（0~8m）</text>
    <text x="20" y="60" font-size="10" fill="#4a5568">• C4：车辆后半部分（8~16m）</text>
  </g>
</svg>
