<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="topCamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sideCamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="fovGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:0.1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1400" height="1200" fill="#f7fafc"/>
  
  <!-- 标题栏 -->
  <g transform="translate(0, 0)">
    <rect width="1400" height="80" fill="url(#headerGrad)"/>
    <text x="700" y="35" text-anchor="middle" font-size="24" fill="white" font-weight="bold">
      相机视野覆盖与坐标映射示意图
    </text>
    <text x="700" y="60" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">
      Camera Field of View &amp; Coordinate Mapping - Mode 1 (Side Wall Installation)
    </text>
  </g>
  
  <!-- ==================== 主视图：俯视部署图 ==================== -->
  <g transform="translate(50, 100)">
    <!-- 背景框 -->
    <rect x="0" y="0" width="800" height="520" rx="12" fill="white" stroke="#cbd5e0" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <text x="400" y="30" text-anchor="middle" font-size="16" fill="#667eea" font-weight="bold">俯视图：相机布局与视野覆盖</text>
    
    <!-- 龙门架结构 -->
    <rect x="100" y="50" width="600" height="50" rx="8" fill="url(#headerGrad)" opacity="0.9"/>
    <text x="400" y="80" text-anchor="middle" font-size="14" fill="white" font-weight="bold">龙门架（高度 6m）</text>
    
    <!-- 顶部相机 C5 -->
    <g transform="translate(250, 75)">
      <circle cx="0" cy="0" r="20" fill="url(#topCamGrad)" filter="url(#shadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C5</text>
      
      <!-- 视野范围（梯形） -->
      <path d="M -20,10 L -100,280 L 100,280 L 20,10 Z" fill="url(#fovGrad)" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5"/>
      
      <!-- 中心线 -->
      <line x1="0" y1="10" x2="0" y2="280" stroke="#f093fb" stroke-width="1.5" stroke-dasharray="3,3"/>
    </g>
    
    <!-- 顶部相机 C6 -->
    <g transform="translate(550, 75)">
      <circle cx="0" cy="0" r="20" fill="url(#topCamGrad)" filter="url(#shadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C6</text>
      
      <!-- 视野范围（梯形） -->
      <path d="M -20,10 L -100,280 L 100,280 L 20,10 Z" fill="url(#fovGrad)" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5"/>
      
      <!-- 中心线 -->
      <line x1="0" y1="10" x2="0" y2="280" stroke="#f5576c" stroke-width="1.5" stroke-dasharray="3,3"/>
    </g>
    
    <!-- 车道边界 -->
    <rect x="200" y="180" width="400" height="240" fill="none" stroke="#a0aec0" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="400" y="170" text-anchor="middle" font-size="12" fill="#718096">车道宽度 3.5m</text>
    
    <!-- 左侧集装箱（20 尺） -->
    <g transform="translate(240, 220)">
      <rect x="0" y="0" width="160" height="170" rx="8" fill="url(#sideCamGrad)" filter="url(#shadow)" opacity="0.85"/>
      <text x="80" y="70" text-anchor="middle" font-size="13" fill="#1a535c" font-weight="bold">20 尺箱 A</text>
      <text x="80" y="95" text-anchor="middle" font-size="11" fill="#1a535c">（左箱）</text>
      
      <!-- 箱号区域高亮 -->
      <rect x="115" y="10" width="35" height="25" rx="4" fill="rgba(255,255,255,0.5)" stroke="white" stroke-width="2"/>
      <text x="133" y="28" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号</text>
      
      <!-- 角点标记 -->
      <circle cx="0" cy="0" r="4" fill="#ff0000"/>
      <circle cx="160" cy="0" r="4" fill="#ff0000"/>
      <circle cx="0" cy="170" r="4" fill="#ff0000"/>
      <circle cx="160" cy="170" r="4" fill="#ff0000"/>
    </g>
    
    <!-- 右侧集装箱（20 尺） -->
    <g transform="translate(400, 220)">
      <rect x="0" y="0" width="160" height="170" rx="8" fill="url(#sideCamGrad)" filter="url(#shadow)" opacity="0.85"/>
      <text x="80" y="70" text-anchor="middle" font-size="13" fill="#1a535c" font-weight="bold">20 尺箱 B</text>
      <text x="80" y="95" text-anchor="middle" font-size="11" fill="#1a535c">（右箱）</text>
      
      <!-- 箱号区域高亮 -->
      <rect x="10" y="10" width="35" height="25" rx="4" fill="rgba(255,255,255,0.5)" stroke="white" stroke-width="2"/>
      <text x="28" y="28" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号</text>
      
      <!-- 角点标记 -->
      <circle cx="0" cy="0" r="4" fill="#ff0000"/>
      <circle cx="160" cy="0" r="4" fill="#ff0000"/>
      <circle cx="0" cy="170" r="4" fill="#ff0000"/>
      <circle cx="160" cy="170" r="4" fill="#ff0000"/>
    </g>
    
    <!-- 侧壁相机 C3 -->
    <g transform="translate(160, 450)">
      <rect x="-15" y="-12" width="30" height="24" rx="4" fill="url(#topCamGrad)" filter="url(#shadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C3</text>
      <text x="0" y="35" text-anchor="middle" font-size="10" fill="#f5576c">侧壁左相机</text>
      <text x="0" y="50" text-anchor="middle" font-size="9" fill="#a0aec0">高度 1.5m</text>
      
      <!-- 拍摄范围指示 -->
      <path d="M 0,-12 L 0,-120" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowBlue)"/>
    </g>
    
    <!-- 侧壁相机 C4 -->
    <g transform="translate(640, 450)">
      <rect x="-15" y="-12" width="30" height="24" rx="4" fill="url(#topCamGrad)" filter="url(#shadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C4</text>
      <text x="0" y="35" text-anchor="middle" font-size="10" fill="#f093fb">侧壁右相机</text>
      <text x="0" y="50" text-anchor="middle" font-size="9" fill="#a0aec0">高度 1.5m</text>
      
      <!-- 拍摄范围指示 -->
      <path d="M 0,-12 L 0,-120" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowBlue)"/>
    </g>
    
    <!-- 行驶方向 -->
    <g transform="translate(400, 500)">
      <text x="0" y="-10" text-anchor="middle" font-size="12" fill="#4a5568" font-weight="bold">行驶方向</text>
      <line x1="-60" y1="0" x2="60" y2="0" stroke="#667eea" stroke-width="3" marker-end="url(#arrowBlue)"/>
    </g>
  </g>
  
  <!-- ==================== 右侧：映射原理说明 ==================== -->
  <g transform="translate(880, 100)">
    <rect x="0" y="0" width="470" height="250" rx="12" fill="white" stroke="#cbd5e0" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <text x="235" y="28" text-anchor="middle" font-size="15" fill="#667eea" font-weight="bold">坐标映射原理（单应矩阵）</text>
    
    <!-- 顶部图像平面 -->
    <g transform="translate(30, 50)">
      <rect x="0" y="0" width="140" height="90" rx="6" fill="#edf2f7" stroke="#667eea" stroke-width="2"/>
      <text x="70" y="-8" text-anchor="middle" font-size="10" fill="#667eea" font-weight="bold">顶部相机图像</text>
      
      <!-- 箱体边界框 -->
      <rect x="25" y="15" width="90" height="60" rx="4" fill="rgba(102,126,234,0.2)" stroke="#667eea" stroke-width="2"/>
      
      <!-- 角点坐标 -->
      <circle cx="25" cy="15" r="3" fill="#f56565"/>
      <text x="32" y="12" font-size="7" fill="#333">(x₁,y₁)</text>
      
      <circle cx="115" cy="75" r="3" fill="#f56565"/>
      <text x="95" y="88" font-size="7" fill="#333">(x₂,y₂)</text>
      
      <!-- 箱号点 -->
      <circle cx="100" cy="25" r="4" fill="#48bb78"/>
      <text x="108" y="23" font-size="7" fill="#333">箱号点 P</text>
    </g>
    
    <!-- 映射箭头 -->
    <g transform="translate(190, 90)">
      <path d="M 0,0 L 40,0" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      <text x="20" y="-8" text-anchor="middle" font-size="9" fill="#667eea">H</text>
    </g>
    
    <!-- 侧壁图像平面 -->
    <g transform="translate(250, 50)">
      <rect x="0" y="0" width="140" height="90" rx="6" fill="#edf2f7" stroke="#4facfe" stroke-width="2"/>
      <text x="70" y="-8" text-anchor="middle" font-size="10" fill="#4facfe" font-weight="bold">侧壁相机 ROI</text>
      
      <!-- 映射后的箱体 -->
      <rect x="15" y="10" width="110" height="70" rx="4" fill="rgba(79,172,254,0.2)" stroke="#4facfe" stroke-width="2"/>
      
      <!-- 映射后的角点 -->
      <circle cx="15" cy="10" r="3" fill="#f56565"/>
      <text x="22" y="7" font-size="7" fill="#333">(x'₁,y'₁)</text>
      
      <circle cx="125" cy="80" r="3" fill="#f56565"/>
      <text x="100" y="93" font-size="7" fill="#333">(x'₂,y'₂)</text>
      
      <!-- 映射后的箱号点 -->
      <circle cx="115" cy="20" r="4" fill="#48bb78"/>
      <text x="123" y="18" font-size="7" fill="#333">P'</text>
    </g>
    
    <!-- 公式说明 -->
    <g transform="translate(30, 160)">
      <text x="0" y="0" font-size="10" fill="#2d3748" font-weight="bold">坐标变换公式：</text>
      <text x="10" y="18" font-size="11" fill="#4a5568" font-family="monospace">[x', y', 1]ᵀ = H · [x, y, 1]ᵀ</text>
      <text x="10" y="38" font-size="9" fill="#718096">H: 3×3 单应矩阵（通过标定板预先计算）</text>
    </g>
  </g>
  
  <!-- ==================== 右侧：技术参数表 ==================== -->
  <g transform="translate(880, 360)">
    <rect x="0" y="0" width="470" height="260" rx="12" fill="white" stroke="#cbd5e0" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <text x="235" y="28" text-anchor="middle" font-size="15" fill="#667eea" font-weight="bold">相机技术参数与覆盖范围</text>
    
    <!-- 表格内容 -->
    <g transform="translate(25, 50)">
      <!-- 行 1 -->
      <text x="0" y="0" font-size="11" fill="#333" font-weight="bold">顶部相机（C5/C6）：</text>
      <text x="15" y="20" font-size="9" fill="#666">• 分辨率：1920×1080 @ 200 万像素</text>
      <text x="15" y="36" font-size="9" fill="#666">• 镜头：2.8mm 电动变焦</text>
      <text x="15" y="52" font-size="9" fill="#666">• 安装高度：6 米，俯角 10°</text>
      <text x="15" y="68" font-size="9" fill="#666">• 覆盖范围：水平 6.5m × 垂直 4.8m</text>
      <text x="15" y="84" font-size="9" fill="#666">• 作用：箱体检测、角点定位、箱门朝向判断</text>
      
      <!-- 行 2 -->
      <text x="0" y="110" font-size="11" fill="#333" font-weight="bold">侧壁相机（C3/C4）：</text>
      <text x="15" y="130" font-size="9" fill="#666">• 分辨率：1920×1080 @ 200 万像素（复用）</text>
      <text x="15" y="146" font-size="9" fill="#666">• 镜头：6mm~8mm（需覆盖 6m 箱长）</text>
      <text x="15" y="162" font-size="9" fill="#666">• 安装高度：1.5 米，距车道 3 米</text>
      <text x="15" y="178" font-size="9" fill="#666">• 覆盖范围：集装箱侧面全长</text>
      <text x="15" y="194" font-size="9" fill="#666">• 作用：箱号 OCR 识别</text>
      
      <!-- 行 3 -->
      <text x="0" y="220" font-size="10" fill="#f56565" font-weight="bold">• 同步精度：时间误差 &lt; 10ms</text>
      <text x="200" y="220" font-size="10" fill="#38f9d7" font-weight="bold">• 映射精度：像素级定位</text>
    </g>
  </g>
  
  <!-- ==================== 底部：处理流程 ==================== -->
  <g transform="translate(50, 640)">
    <rect x="0" y="0" width="1300" height="200" rx="12" fill="white" stroke="#cbd5e0" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <text x="650" y="30" text-anchor="middle" font-size="15" fill="#667eea" font-weight="bold">ROI 映射与识别流程</text>
    
    <!-- 流程步骤 - 水平布局 -->
    <g transform="translate(50, 55)">
      <!-- 步骤 1 -->
      <rect x="0" y="0" width="200" height="70" rx="6" fill="url(#topCamGrad)" filter="url(#shadow)"/>
      <text x="100" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">1. 顶部相机检测</text>
      <text x="100" y="50" text-anchor="middle" font-size="10" fill="white">箱体边界框和角点定位</text>
      
      <!-- 箭头 -->
      <path d="M 200,35 L 220,35" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <!-- 步骤 2 -->
      <rect x="230" y="0" width="200" height="70" rx="6" fill="url(#sideCamGrad)" filter="url(#shadow)"/>
      <text x="330" y="30" text-anchor="middle" font-size="12" fill="#1a535c" font-weight="bold">2. 坐标计算</text>
      <text x="330" y="50" text-anchor="middle" font-size="10" fill="#1a535c">箱号像素坐标 (x, y)</text>
      
      <!-- 箭头 -->
      <path d="M 430,35 L 450,35" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <!-- 步骤 3 -->
      <rect x="460" y="0" width="200" height="70" rx="6" fill="#edf2f7" stroke="#667eea" stroke-width="2"/>
      <text x="560" y="30" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">3. 矩阵变换</text>
      <text x="560" y="50" text-anchor="middle" font-size="10" fill="#333">单应矩阵 H 坐标变换</text>
      
      <!-- 箭头 -->
      <path d="M 660,35 L 680,35" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <!-- 步骤 4 -->
      <rect x="690" y="0" width="200" height="70" rx="6" fill="#e6fffa" stroke="#38f9d7" stroke-width="2"/>
      <text x="790" y="30" text-anchor="middle" font-size="12" fill="#1a535c" font-weight="bold">4. ROI 裁剪</text>
      <text x="790" y="50" text-anchor="middle" font-size="10" fill="#1a535c">侧壁图像区域 (x', y')</text>
      
      <!-- 箭头 -->
      <path d="M 890,35 L 910,35" stroke="#667eea" stroke-width="2" marker-end="url(#arrowBlue)"/>
      
      <!-- 步骤 5 -->
      <rect x="920" y="0" width="200" height="70" rx="6" fill="url(#topCamGrad)" filter="url(#shadow)"/>
      <text x="1020" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">5. OCR 识别</text>
      <text x="1020" y="50" text-anchor="middle" font-size="10" fill="white">箱号字符识别输出</text>
    </g>
    
    <!-- 底部说明 -->
    <g transform="translate(50, 145)">
      <text x="0" y="0" font-size="10" fill="#4a5568" font-weight="bold">核心优势：</text>
      <text x="70" y="0" font-size="9" fill="#666">• 像素级定位精度  • 自适应各种箱体位置  • 减少无效计算提升速度  • 识别率提升至 ≥98%</text>
      
      <text x="0" y="20" font-size="10" fill="#4a5568" font-weight="bold">关键指标：</text>
      <text x="70" y="20" font-size="9" fill="#666">处理时间 ≤50ms/箱  |  映射误差 &lt;5像素  |  支持 15°以内倾斜角度</text>
    </g>
  </g>
  
  <!-- ==================== 底部：标定方法 ==================== -->
  <g transform="translate(50, 860)">
    <rect x="0" y="0" width="1300" height="320" rx="12" fill="white" stroke="#cbd5e0" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <text x="650" y="30" text-anchor="middle" font-size="15" fill="#667eea" font-weight="bold">单应矩阵标定方法与维护</text>
    
    <!-- 内容 - 四列布局 -->
    <g transform="translate(40, 55)">
      <!-- 步骤 1 -->
      <rect x="0" y="0" width="290" height="200" rx="8" fill="#fff5f5" stroke="#fed7d7" stroke-width="1"/>
      <text x="145" y="25" text-anchor="middle" font-size="12" fill="#c53030" font-weight="bold">1. 标定板准备</text>
      <text x="15" y="50" font-size="10" fill="#4a5568">• 使用棋盘格或圆点标定板</text>
      <text x="15" y="70" font-size="10" fill="#4a5568">• 推荐 9×6 或 11×8 规格</text>
      <text x="15" y="90" font-size="10" fill="#4a5568">• 标定板尺寸与实际车道</text>
      <text x="30" y="110" font-size="10" fill="#4a5568">尺寸成比例关系</text>
      <text x="15" y="140" font-size="10" fill="#718096">提示：标定板需平整、无反光</text>
      
      <!-- 步骤 2 -->
      <rect x="310" y="0" width="290" height="200" rx="8" fill="#ebf8ff" stroke="#bee3f8" stroke-width="1"/>
      <text x="455" y="25" text-anchor="middle" font-size="12" fill="#2b6cb0" font-weight="bold">2. 数据采集</text>
      <text x="325" y="50" font-size="10" fill="#4a5568">• 同时拍摄顶部和侧壁图像</text>
      <text x="325" y="70" font-size="10" fill="#4a5568">• 确保标定板在两相机视野内</text>
      <text x="325" y="90" font-size="10" fill="#4a5568">• 在不同位置拍摄 10+ 组图像</text>
      <text x="325" y="110" font-size="10" fill="#4a5568">• 覆盖整个车道宽度范围</text>
      <text x="325" y="140" font-size="10" fill="#718096">提示：避免运动模糊和过曝</text>
      
      <!-- 步骤 3 -->
      <rect x="620" y="0" width="290" height="200" rx="8" fill="#f0fff4" stroke="#c6f6d5" stroke-width="1"/>
      <text x="765" y="25" text-anchor="middle" font-size="12" fill="#276749" font-weight="bold">3. 特征点匹配</text>
      <text x="635" y="50" font-size="10" fill="#4a5568">• 提取标定板角点坐标</text>
      <text x="635" y="70" font-size="10" fill="#4a5568">• 建立图像对对应关系</text>
      <text x="635" y="90" font-size="10" fill="#4a5568">• 至少 4 组对应点（推荐 20+）</text>
      <text x="635" y="110" font-size="10" fill="#4a5568">• 使用亚像素精度定位</text>
      <text x="635" y="140" font-size="10" fill="#718096">提示：角点检测误差 &lt;0.5像素</text>
      
      <!-- 步骤 4 -->
      <rect x="930" y="0" width="330" height="200" rx="8" fill="#faf5ff" stroke="#e9d8fd" stroke-width="1"/>
      <text x="1095" y="25" text-anchor="middle" font-size="12" fill="#6b46c1" font-weight="bold">4. 矩阵计算与维护</text>
      <text x="945" y="50" font-size="10" fill="#4a5568">• OpenCV: findHomography()</text>
      <text x="945" y="70" font-size="10" fill="#4a5568">• RANSAC 算法剔除异常点</text>
      <text x="945" y="90" font-size="10" fill="#4a5568">• 重投影误差 &lt;1 像素</text>
      <text x="945" y="110" font-size="10" fill="#e53e3e" font-weight="bold">• 每月巡检校准一次</text>
      <text x="945" y="130" font-size="10" fill="#e53e3e" font-weight="bold">• 相机移位后需重新标定</text>
    </g>
  </g>
</svg>
