<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sideGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="800" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">
    模式一：标准侧壁安装部署示意图
  </text>
  <text x="600" y="65" text-anchor="middle" font-size="14" fill="#666">
    （俯视图 - 龙门架高 6m，车道宽 3.5m）
  </text>
  
  <!-- 龙门架顶部结构 -->
  <g transform="translate(0, 100)">
    <rect x="100" y="0" width="1000" height="80" rx="10" fill="url(#topGrad)" filter="url(#shadow)"/>
    <text x="600" y="45" text-anchor="middle" font-size="16" fill="white" font-weight="bold">
      龙门架（高度 6 米）
    </text>
  </g>
  
  <!-- 顶部相机 C5 -->
  <g transform="translate(350, 110)">
    <circle cx="0" cy="0" r="25" fill="url(#sideGrad)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C5</text>
    <text x="0" y="-30" text-anchor="middle" font-size="11" fill="#667eea">顶部左相机</text>
    
    <!-- 视野范围 -->
    <path d="M -30,10 L -80,250 L 80,250 L 30,10 Z" fill="rgba(102,126,234,0.15)" stroke="#667eea" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 顶部相机 C6 -->
  <g transform="translate(850, 110)">
    <circle cx="0" cy="0" r="25" fill="url(#sideGrad)" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C6</text>
    <text x="0" y="-30" text-anchor="middle" font-size="11" fill="#764ba2">顶部右相机</text>
    
    <!-- 视野范围 -->
    <path d="M -30,10 L -80,250 L 80,250 L 30,10 Z" fill="rgba(118,75,162,0.15)" stroke="#764ba2" stroke-width="1" stroke-dasharray="5,5"/>
  </g>
  
  <!-- 车道边界 -->
  <g transform="translate(0, 200)">
    <rect x="300" y="0" width="600" height="300" fill="none" stroke="#999" stroke-width="2" stroke-dasharray="10,5"/>
    <text x="600" y="-15" text-anchor="middle" font-size="13" fill="#666">车道宽度 3.5m</text>
  </g>
  
  <!-- 左侧集装箱（20 尺） -->
  <g transform="translate(380, 240)">
    <rect x="0" y="0" width="240" height="180" rx="8" fill="url(#containerGrad)" filter="url(#shadow)" opacity="0.9"/>
    <text x="120" y="50" text-anchor="middle" font-size="16" fill="white" font-weight="bold">20 尺箱 A</text>
    <text x="120" y="75" text-anchor="middle" font-size="13" fill="white">（左箱）</text>
    <text x="120" y="110" text-anchor="middle" font-size="12" fill="white" font-style="italic">箱号侧面可见</text>
    
    <!-- 箱号区域标识 -->
    <rect x="170" y="20" width="50" height="40" rx="3" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
    <text x="195" y="45" text-anchor="middle" font-size="10" fill="white">箱号</text>
  </g>
  
  <!-- 右侧集装箱（20 尺） -->
  <g transform="translate(580, 240)">
    <rect x="0" y="0" width="240" height="180" rx="8" fill="url(#containerGrad)" filter="url(#shadow)" opacity="0.9"/>
    <text x="120" y="50" text-anchor="middle" font-size="16" fill="white" font-weight="bold">20 尺箱 B</text>
    <text x="120" y="75" text-anchor="middle" font-size="13" fill="white">（右箱）</text>
    <text x="120" y="110" text-anchor="middle" font-size="12" fill="white" font-style="italic">箱号侧面可见</text>
    
    <!-- 箱号区域标识 -->
    <rect x="20" y="20" width="50" height="40" rx="3" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
    <text x="45" y="45" text-anchor="middle" font-size="10" fill="white">箱号</text>
  </g>
  
  <!-- 侧壁相机 C3（左侧） -->
  <g transform="translate(280, 480)">
    <rect x="-20" y="-15" width="40" height="30" rx="5" fill="#f093fb" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C3</text>
    <text x="0" y="50" text-anchor="middle" font-size="11" fill="#f5576c">侧壁左相机</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#999">高度 1.5m</text>
    
    <!-- 拍摄范围指示 -->
    <path d="M 0,-15 L 0,-120" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- 侧壁相机 C4（右侧） -->
  <g transform="translate(920, 480)">
    <rect x="-20" y="-15" width="40" height="30" rx="5" fill="#f5576c" filter="url(#shadow)"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C4</text>
    <text x="0" y="50" text-anchor="middle" font-size="11" fill="#f093fb">侧壁右相机</text>
    <text x="0" y="65" text-anchor="middle" font-size="10" fill="#999">高度 1.5m</text>
    
    <!-- 拍摄范围指示 -->
    <path d="M 0,-15 L 0,-120" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  </g>
  
  <!-- 行驶方向箭头 -->
  <g transform="translate(600, 600)">
    <text x="0" y="-20" text-anchor="middle" font-size="14" fill="#666">行驶方向</text>
    <path d="M -100,0 L 100,0" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
    <polygon points="100,-10 120,0 100,10" fill="#667eea"/>
  </g>
  
  <!-- 图例 -->
  <g transform="translate(50, 650)">
    <rect x="0" y="0" width="200" height="120" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="100" y="25" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">图例说明</text>
    
    <circle cx="30" cy="50" r="10" fill="url(#sideGrad)"/>
    <text x="50" y="55" font-size="11" fill="#333">顶部相机（C5/C6）</text>
    
    <rect x="20" y="70" width="20" height="15" rx="3" fill="#f093fb"/>
    <text x="50" y="82" font-size="11" fill="#333">侧壁相机</text>
    
    <rect x="20" y="95" width="20" height="15" rx="3" fill="url(#containerGrad)"/>
    <text x="50" y="107" font-size="11" fill="#333">集装箱（20 尺）</text>
  </g>
  
  <!-- 技术参数标注 -->
  <g transform="translate(850, 650)">
    <rect x="0" y="0" width="300" height="120" fill="white" stroke="#ddd" stroke-width="1" rx="5"/>
    <text x="150" y="25" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">关键技术参数</text>
    
    <text x="20" y="50" font-size="11" fill="#666">• 顶部相机：200 万像素，2.8mm 镜头</text>
    <text x="20" y="70" font-size="11" fill="#666">• 安装高度：6 米，俯角 10°</text>
    <text x="20" y="90" font-size="11" fill="#666">• 侧壁相机：高度 1.5m，距车道 3m</text>
    <text x="20" y="110" font-size="11" fill="#666">• C5-C6 间距：2.4 米</text>
  </g>
</svg>
