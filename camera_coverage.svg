<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="1100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="frontCamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="rearCamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="sideCamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="fovGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:0.1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1400" height="1100" fill="#f7fafc"/>
  
  <!-- 标题栏 -->
  <rect width="1400" height="80" fill="url(#headerGrad)"/>
  <text x="700" y="35" text-anchor="middle" font-size="24" fill="white" font-weight="bold">
    五相机部署方案 - 道闸前后高位俯拍+侧壁拍摄
  </text>
  <text x="700" y="60" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.9)">
    5-Camera Deployment: Front/Rear Overhead + Side Wall Cameras
  </text>
  
  <!-- ==================== 主视图：车道部署图 ==================== -->
  <g transform="translate(50, 100)">
    <!-- 背景框 -->
    <rect x="0" y="0" width="1300" height="500" rx="12" fill="white" stroke="#cbd5e0" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- 标题 -->
    <text x="650" y="30" text-anchor="middle" font-size="16" fill="#667eea" font-weight="bold">俯视图：五相机部署方案（无地感纯视觉）</text>
    
    <!-- 车道区域 -->
    <rect x="200" y="100" width="600" height="350" fill="#f0f5ff" stroke="#2f54eb" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="500" y="85" text-anchor="middle" font-size="12" fill="#2f54eb">车道区域（宽 3.5m）</text>
    
    <!-- 道闸前位置线 -->
    <line x1="250" y1="100" x2="250" y2="450" stroke="#ff4d4f" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="250" y="470" text-anchor="middle" font-size="11" fill="#ff4d4f" font-weight="bold">道闸前</text>
    
    <!-- 道闸后位置线 -->
    <line x1="750" y1="100" x2="750" y2="450" stroke="#ff4d4f" stroke-width="3" stroke-dasharray="5,5"/>
    <text x="750" y="470" text-anchor="middle" font-size="11" fill="#ff4d4f" font-weight="bold">道闸后</text>
    
    <!-- C5: 道闸前上方相机 -->
    <g transform="translate(250, 50)">
      <circle cx="0" cy="0" r="25" fill="url(#frontCamGrad)" filter="url(#shadow)"/>
      <text x="0" y="6" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C5</text>
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#f5576c" font-weight="bold">道闸前高位</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#666">高度 8-10m</text>
      
      <!-- 视野范围 -->
      <path d="M -30,10 L -180,400 L 180,400 L 30,10 Z" fill="url(#fovGrad)" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
      
      <!-- 拍摄方向箭头 -->
      <line x1="0" y1="25" x2="0" y2="150" stroke="#f5576c" stroke-width="2" marker-end="url(#arrowBlue)"/>
    </g>
    
    <!-- C6: 道闸后上方相机 -->
    <g transform="translate(750, 50)">
      <circle cx="0" cy="0" r="25" fill="url(#rearCamGrad)" filter="url(#shadow)"/>
      <text x="0" y="6" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C6</text>
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#ee5a5a" font-weight="bold">道闸后高位</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#666">高度 8-10m</text>
      
      <!-- 视野范围 -->
      <path d="M -30,10 L -180,400 L 180,400 L 30,10 Z" fill="url(#fovGrad)" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
      
      <!-- 拍摄方向箭头 -->
      <line x1="0" y1="25" x2="0" y2="150" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowBlue)"/>
    </g>
    
    <!-- 集装箱车辆示意 -->
    <g transform="translate(350, 200)">
      <!-- 车头 -->
      <rect x="0" y="0" width="80" height="120" rx="10" fill="#ffd666" stroke="#d48806" stroke-width="2"/>
      <text x="40" y="50" text-anchor="middle" font-size="11" fill="#874d00" font-weight="bold">车头</text>
      
      <!-- 集装箱A（左箱） -->
      <rect x="100" y="10" width="140" height="100" rx="8" fill="#4facfe" stroke="#096dd9" stroke-width="2" opacity="0.8"/>
      <text x="170" y="45" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">20尺箱A</text>
      <text x="170" y="65" text-anchor="middle" font-size="9" fill="#fff">左箱</text>
      
      <!-- 箱号区域 -->
      <rect x="200" y="20" width="30" height="20" rx="3" fill="rgba(255,255,255,0.7)"/>
      <text x="215" y="34" text-anchor="middle" font-size="7" fill="#333">箱号</text>
      
      <!-- 集装箱B（右箱） -->
      <rect x="260" y="10" width="140" height="100" rx="8" fill="#4facfe" stroke="#096dd9" stroke-width="2" opacity="0.8"/>
      <text x="330" y="45" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">20尺箱B</text>
      <text x="330" y="65" text-anchor="middle" font-size="9" fill="#fff">右箱</text>
      
      <!-- 箱号区域 -->
      <rect x="270" y="20" width="30" height="20" rx="3" fill="rgba(255,255,255,0.7)"/>
      <text x="285" y="34" text-anchor="middle" font-size="7" fill="#333">箱号</text>
    </g>
    
    <!-- C3: 左侧壁相机 -->
    <g transform="translate(150, 280)">
      <rect x="-20" y="-15" width="40" height="30" rx="5" fill="url(#sideCamGrad)" filter="url(#shadow)"/>
      <text x="0" y="6" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C3</text>
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#1890ff" font-weight="bold">左侧壁</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#666">高度 1.5m</text>
      
      <!-- 拍摄方向 -->
      <line x1="20" y1="0" x2="150" y2="0" stroke="#4facfe" stroke-width="2" marker-end="url(#arrowBlue)"/>
    </g>
    
    <!-- C4: 右侧壁相机 -->
    <g transform="translate(850, 280)">
      <rect x="-20" y="-15" width="40" height="30" rx="5" fill="url(#sideCamGrad)" filter="url(#shadow)"/>
      <text x="0" y="6" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C4</text>
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#1890ff" font-weight="bold">右侧壁</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#666">高度 1.5m</text>
      
      <!-- 拍摄方向 -->
      <line x1="-20" y1="0" x2="-150" y2="0" stroke="#00f2fe" stroke-width="2" marker-end="url(#arrowBlue)"/>
    </g>
    
    <!-- 行驶方向 -->
    <g transform="translate(500, 420)">
      <text x="0" y="0" text-anchor="middle" font-size="13" fill="#4a5568" font-weight="bold">行驶方向 →</text>
      <line x1="-60" y1="15" x2="60" y2="15" stroke="#667eea" stroke-width="3" marker-end="url(#arrowBlue)"/>
    </g>
  </g>
  
  <!-- ==================== 侧视图：高角度拍摄示意 ==================== -->
  <g transform="translate(50, 620)">
    <rect x="0" y="0" width="630" height="450" rx="12" fill="white" stroke="#cbd5e0" stroke-width="2" filter="url(#shadow)"/>
    
    <text x="315" y="30" text-anchor="middle" font-size="15" fill="#667eea" font-weight="bold">侧视图：高位俯拍示意</text>
    
    <!-- 地面 -->
    <line x1="50" y1="380" x2="580" y2="380" stroke="#4a5568" stroke-width="3"/>
    
    <!-- 道闸前立柱 -->
    <rect x="100" y="50" width="15" height="330" fill="#8c8c8c"/>
    <text x="107" y="40" text-anchor="middle" font-size="9" fill="#666">道闸前</text>
    
    <!-- C5相机 -->
    <circle cx="107" cy="45" r="18" fill="url(#frontCamGrad)" filter="url(#shadow)"/>
    <text x="107" y="50" text-anchor="middle" font-size="9" fill="white" font-weight="bold">C5</text>
    
    <!-- 视野线C5 -->
    <line x1="107" y1="63" x2="107" y2="380" stroke="#f5576c" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M 107,63 L 200,380 L 400,380" fill="none" stroke="#f5576c" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
    
    <!-- 道闸后立柱 -->
    <rect x="500" y="50" width="15" height="330" fill="#8c8c8c"/>
    <text x="507" y="40" text-anchor="middle" font-size="9" fill="#666">道闸后</text>
    
    <!-- C6相机 -->
    <circle cx="507" cy="45" r="18" fill="url(#rearCamGrad)" filter="url(#shadow)"/>
    <text x="507" y="50" text-anchor="middle" font-size="9" fill="white" font-weight="bold">C6</text>
    
    <!-- 视野线C6 -->
    <line x1="507" y1="63" x2="507" y2="380" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="M 507,63 L 400,380 L 200,380" fill="none" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
    
    <!-- 车辆 -->
    <g transform="translate(200, 260)">
      <!-- 车头 -->
      <rect x="0" y="0" width="60" height="80" rx="5" fill="#ffd666"/>
      <text x="30" y="45" text-anchor="middle" font-size="9" fill="#874d00">车头</text>
      
      <!-- 集装箱 -->
      <rect x="70" y="10" width="200" height="70" rx="5" fill="#4facfe" opacity="0.8"/>
      <text x="170" y="35" text-anchor="middle" font-size="10" fill="white" font-weight="bold">集装箱</text>
      <text x="170" y="55" text-anchor="middle" font-size="9" fill="white">12-14米</text>
      
      <!-- 车轮 -->
      <circle cx="20" cy="80" r="12" fill="#333"/>
      <circle cx="280" cy="80" r="12" fill="#333"/>
    </g>
    
    <!-- 高度标注 -->
    <line x1="50" y1="50" x2="50" y2="380" stroke="#666" stroke-width="1"/>
    <line x1="45" y1="50" x2="55" y2="50" stroke="#666" stroke-width="1"/>
    <line x1="45" y1="380" x2="55" y2="380" stroke="#666" stroke-width="1"/>
    <text x="35" y="220" text-anchor="middle" font-size="10" fill="#666" transform="rotate(-90, 35, 220)">相机高度 8-10m</text>
    
    <!-- 说明文字 -->
    <g transform="translate(50, 400)">
      <text x="0" y="0" font-size="11" fill="#333" font-weight="bold">高位俯拍优势：</text>
      <text x="0" y="20" font-size="10" fill="#666">• 视野覆盖整个车道</text>
      <text x="0" y="38" font-size="10" fill="#666">• 箱体顶部特征清晰（角件）</text>
      <text x="0" y="56" font-size="10" fill="#666">• 车头/车尾分离度好</text>
      <text x="0" y="74" font-size="10" fill="#666">• 支持空车/载重判断</text>
    </g>
  </g>
  
  <!-- ==================== 右侧：相机参数表 ==================== -->
  <g transform="translate(710, 620)">
    <rect x="0" y="0" width="640" height="450" rx="12" fill="white" stroke="#cbd5e0" stroke-width="2" filter="url(#shadow)"/>
    
    <text x="320" y="30" text-anchor="middle" font-size="15" fill="#667eea" font-weight="bold">五相机技术参数</text>
    
    <!-- 表格 -->
    <g transform="translate(30, 60)">
      <!-- 表头 -->
      <rect x="0" y="0" width="580" height="35" rx="4" fill="#f0f5ff"/>
      <text x="50" y="23" text-anchor="middle" font-size="11" fill="#1d39c4" font-weight="bold">相机</text>
      <text x="160" y="23" text-anchor="middle" font-size="11" fill="#1d39c4" font-weight="bold">位置</text>
      <text x="280" y="23" text-anchor="middle" font-size="11" fill="#1d39c4" font-weight="bold">安装参数</text>
      <text x="420" y="23" text-anchor="middle" font-size="11" fill="#1d39c4" font-weight="bold">覆盖范围</text>
      <text x="520" y="23" text-anchor="middle" font-size="11" fill="#1d39c4" font-weight="bold">作用</text>
      
      <!-- C5 -->
      <rect x="0" y="40" width="580" height="50" fill="#fff2f0"/>
      <text x="50" y="70" text-anchor="middle" font-size="11" fill="#cf1322" font-weight="bold">C5</text>
      <text x="160" y="70" text-anchor="middle" font-size="10" fill="#333">道闸前上方</text>
      <text x="280" y="60" text-anchor="middle" font-size="9" fill="#666">高度8-10m</text>
      <text x="280" y="78" text-anchor="middle" font-size="9" fill="#666">俯角30-45°</text>
      <text x="420" y="60" text-anchor="middle" font-size="9" fill="#666">车头+前半箱体</text>
      <text x="420" y="78" text-anchor="middle" font-size="9" fill="#666">约8m范围</text>
      <text x="520" y="60" text-anchor="middle" font-size="9" fill="#666">实时检测</text>
      <text x="520" y="78" text-anchor="middle" font-size="9" fill="#666">车头定位</text>
      
      <!-- C6 -->
      <rect x="0" y="95" width="580" height="50" fill="#fff2f0"/>
      <text x="50" y="125" text-anchor="middle" font-size="11" fill="#cf1322" font-weight="bold">C6</text>
      <text x="160" y="125" text-anchor="middle" font-size="10" fill="#333">道闸后上方</text>
      <text x="280" y="115" text-anchor="middle" font-size="9" fill="#666">高度8-10m</text>
      <text x="280" y="133" text-anchor="middle" font-size="9" fill="#666">俯角30-45°</text>
      <text x="420" y="115" text-anchor="middle" font-size="9" fill="#666">车尾+后半箱体</text>
      <text x="420" y="133" text-anchor="middle" font-size="9" fill="#666">约8m范围</text>
      <text x="520" y="115" text-anchor="middle" font-size="9" fill="#666">尾部确认</text>
      <text x="520" y="133" text-anchor="middle" font-size="9" fill="#666">箱型辅助</text>
      
      <!-- C3 -->
      <rect x="0" y="150" width="580" height="50" fill="#e6f7ff"/>
      <text x="50" y="180" text-anchor="middle" font-size="11" fill="#096dd9" font-weight="bold">C3</text>
      <text x="160" y="180" text-anchor="middle" font-size="10" fill="#333">车道左侧</text>
      <text x="280" y="170" text-anchor="middle" font-size="9" fill="#666">高度1.5m</text>
      <text x="280" y="188" text-anchor="middle" font-size="9" fill="#666">距车道3m</text>
      <text x="420" y="180" text-anchor="middle" font-size="9" fill="#666">左箱侧面全长</text>
      <text x="520" y="170" text-anchor="middle" font-size="9" fill="#666">箱号OCR</text>
      <text x="520" y="188" text-anchor="middle" font-size="9" fill="#666">左箱识别</text>
      
      <!-- C4 -->
      <rect x="0" y="205" width="580" height="50" fill="#e6f7ff"/>
      <text x="50" y="235" text-anchor="middle" font-size="11" fill="#096dd9" font-weight="bold">C4</text>
      <text x="160" y="235" text-anchor="middle" font-size="10" fill="#333">车道右侧</text>
      <text x="280" y="225" text-anchor="middle" font-size="9" fill="#666">高度1.5m</text>
      <text x="280" y="243" text-anchor="middle" font-size="9" fill="#666">距车道3m</text>
      <text x="420" y="235" text-anchor="middle" font-size="9" fill="#666">右箱侧面全长</text>
      <text x="520" y="225" text-anchor="middle" font-size="9" fill="#666">箱号OCR</text>
      <text x="520" y="243" text-anchor="middle" font-size="9" fill="#666">右箱识别</text>
      
      <!-- 底部说明 -->
      <rect x="0" y="270" width="580" height="100" rx="4" fill="#f6ffed"/>
      <text x="290" y="295" text-anchor="middle" font-size="12" fill="#389e0d" font-weight="bold">方案特点</text>
      <text x="20" y="320" font-size="10" fill="#333">✓ 无地感线圈：纯视觉实时检测，无需破路施工</text>
      <text x="20" y="340" font-size="10" fill="#333">✓ 高位视野好：8-10m高度，箱体特征清晰可见</text>
      <text x="20" y="360" font-size="10" fill="#333">✓ 五相机协同：前后顶视+两侧壁，全覆盖无盲区</text>
      <text x="20" y="380" font-size="10" fill="#333">✓ 按需触发：根据检测结果选择性激活相机</text>
    </g>
  </g>
</svg>
