<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="topCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="dualBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="auxCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    
    <filter id="strongShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
    </marker>
    
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00f2fe"/>
    </marker>
    
    <marker id="arrowAux" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="900" fill="#fafbfc"/>
  
  <!-- 标题区域 -->
  <g transform="translate(0, 0)">
    <rect width="1200" height="70" fill="url(#headerGrad)"/>
    <text x="600" y="30" text-anchor="middle" font-size="22" fill="white" font-weight="bold">
      5.5摄像头方案：头尾安装模式（两侧无空间）
    </text>
    <text x="600" y="52" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.9)">
      （两侧无安装空间时的替代方案：C3/C4从前后方拍摄，C7提供门端细节）
    </text>
  </g>
  
  <!-- 入口区域标注 -->
  <g transform="translate(50, 350)">
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#e53e3e" font-weight="bold" transform="rotate(-90)">车辆入口方向 →</text>
  </g>
  
  <!-- 龙门架/顶部结构 - 道闸前 -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="300" height="60" rx="8" fill="url(#topCameraGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="25" text-anchor="middle" font-size="14" fill="white" font-weight="bold">龙门架A - 道闸前</text>
    <text x="150" y="45" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">高度 8-10m</text>
    
    <!-- 顶部相机 C5 -->
    <g transform="translate(150, 30)">
      <circle cx="0" cy="0" r="22" fill="#667eea" stroke="white" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C5</text>
      <!-- 拍摄方向指示 -->
      <path d="M 0,22 L 0,50" stroke="#667eea" stroke-width="2" stroke-dasharray="4,4"/>
      <polygon points="-5,50 0,60 5,50" fill="#667eea"/>
    </g>
  </g>
  
  <!-- 龙门架/顶部结构 - 道闸后 -->
  <g transform="translate(750, 100)">
    <rect x="0" y="0" width="300" height="60" rx="8" fill="url(#topCameraGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="25" text-anchor="middle" font-size="14" fill="white" font-weight="bold">龙门架B - 道闸后</text>
    <text x="150" y="45" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">高度 8-10m</text>
    
    <!-- 顶部相机 C6 -->
    <g transform="translate(150, 30)">
      <circle cx="0" cy="0" r="22" fill="#764ba2" stroke="white" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C6</text>
      <!-- 拍摄方向指示 -->
      <path d="M 0,22 L 0,50" stroke="#764ba2" stroke-width="2" stroke-dasharray="4,4"/>
      <polygon points="-5,50 0,60 5,50" fill="#764ba2"/>
    </g>
  </g>
  
  <!-- 连接龙门架的横线（表示车道上方） -->
  <line x1="300" y1="130" x2="900" y2="130" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- 道闸位置标注 - 道闸前 -->
  <g transform="translate(300, 200)">
    <rect x="-60" y="0" width="120" height="40" rx="6" fill="url(#gateGrad)" filter="url(#shadow)"/>
    <text x="0" y="25" text-anchor="middle" font-size="14" fill="white" font-weight="bold">道闸前</text>
  </g>
  
  <!-- 道闸位置标注 - 道闸后 -->
  <g transform="translate(900, 200)">
    <rect x="-60" y="0" width="120" height="40" rx="6" fill="url(#gateGrad)" filter="url(#shadow)"/>
    <text x="0" y="25" text-anchor="middle" font-size="14" fill="white" font-weight="bold">道闸后</text>
  </g>
  
  <!-- 车道区域 -->
  <g transform="translate(200, 260)">
    <!-- 车道背景 -->
    <rect x="0" y="0" width="800" height="320" fill="#f0f2f5" stroke="#cbd5e0" stroke-width="2" rx="5"/>
    <text x="400" y="-15" text-anchor="middle" font-size="13" fill="#718096">车道宽度 3.5m</text>
    
    <!-- 车道中心线 -->
    <line x1="0" y1="160" x2="800" y2="160" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="20,10"/>
    
    <!-- 左侧集装箱（20尺）- 前半部分 -->
    <g transform="translate(80, 40)">
      <rect x="0" y="0" width="220" height="120" rx="6" fill="url(#dualBoxGrad)" filter="url(#shadow)" opacity="0.95"/>
      <text x="110" y="40" text-anchor="middle" font-size="14" fill="#1a535c" font-weight="bold">前半部分</text>
      <text x="110" y="65" text-anchor="middle" font-size="11" fill="#1a535c">车头+前半箱体</text>
      <text x="110" y="85" text-anchor="middle" font-size="10" fill="#1a535c">C3/C5/C7覆盖区域</text>
      
      <!-- 箱号区域高亮 -->
      <rect x="150" y="15" width="55" height="35" rx="4" fill="rgba(255,255,255,0.4)" stroke="#38f9d7" stroke-width="2"/>
      <text x="177" y="37" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号区</text>
      
      <!-- 门端ISO码区域 -->
      <rect x="15" y="70" width="50" height="30" rx="4" fill="rgba(255,154,158,0.3)" stroke="#ff6b6b" stroke-width="2"/>
      <text x="40" y="90" text-anchor="middle" font-size="8" fill="#c92a2a" font-weight="bold">门端区</text>
    </g>
    
    <!-- 右侧集装箱（20尺）- 后半部分 -->
    <g transform="translate(500, 40)">
      <rect x="0" y="0" width="220" height="120" rx="6" fill="url(#dualBoxGrad)" filter="url(#shadow)" opacity="0.95"/>
      <text x="110" y="40" text-anchor="middle" font-size="14" fill="#1a535c" font-weight="bold">后半部分</text>
      <text x="110" y="65" text-anchor="middle" font-size="11" fill="#1a535c">车尾+后半箱体</text>
      <text x="110" y="85" text-anchor="middle" font-size="10" fill="#1a535c">C4/C6覆盖区域</text>
      
      <!-- 箱号区域高亮 -->
      <rect x="15" y="15" width="55" height="35" rx="4" fill="rgba(255,255,255,0.4)" stroke="#38f9d7" stroke-width="2"/>
      <text x="42" y="37" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号区</text>
    </g>
    
    <!-- 车辆示意 -->
    <g transform="translate(350, 180)">
      <rect x="0" y="0" width="100" height="50" rx="8" fill="#4299e1" opacity="0.6" filter="url(#shadow)"/>
      <text x="50" y="30" text-anchor="middle" font-size="12" fill="white" font-weight="bold">车辆</text>
    </g>
  </g>
  
  <!-- 道闸前侧方相机 C3 -->
  <g transform="translate(200, 620)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="url(#processGrad)" filter="url(#strongShadow)"/>
    <text x="0" y="6" text-anchor="middle" font-size="14" fill="white" font-weight="bold">C3</text>
    <text x="0" y="55" text-anchor="middle" font-size="13" fill="#f5576c" font-weight="bold">前侧方相机</text>
    <text x="0" y="75" text-anchor="middle" font-size="11" fill="#718096">道闸前侧方安装</text>
    <text x="0" y="92" text-anchor="middle" font-size="10" fill="#718096">高度4m，俯角30°</text>
    
    <!-- 拍摄范围指示线 - 指向前半箱体 -->
    <path d="M -25,-20 L 0,-280" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
    <path d="M 25,-20 L 80,-280" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  </g>
  
  <!-- 道闸后侧方相机 C4 -->
  <g transform="translate(1000, 620)">
    <rect x="-30" y="-20" width="60" height="40" rx="8" fill="url(#processGrad)" filter="url(#strongShadow)"/>
    <text x="0" y="6" text-anchor="middle" font-size="14" fill="white" font-weight="bold">C4</text>
    <text x="0" y="55" text-anchor="middle" font-size="13" fill="#f093fb" font-weight="bold">后侧方相机</text>
    <text x="0" y="75" text-anchor="middle" font-size="11" fill="#718096">道闸后侧方安装</text>
    <text x="0" y="92" text-anchor="middle" font-size="10" fill="#718096">高度4m，俯角30°</text>
    
    <!-- 拍摄范围指示线 - 指向后半箱体 -->
    <path d="M -25,-20 L -80,-280" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
    <path d="M 25,-20 L 0,-280" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,5" opacity="0.7"/>
  </g>
  
  <!-- 辅助相机 C7 - 道闸前侧方低位 -->
  <g transform="translate(400, 660)">
    <rect x="-35" y="-22" width="70" height="44" rx="10" fill="url(#auxCameraGrad)" stroke="#ff6b6b" stroke-width="2" filter="url(#strongShadow)"/>
    <text x="0" y="6" text-anchor="middle" font-size="14" fill="#c92a2a" font-weight="bold">C7</text>
    <text x="0" y="45" text-anchor="middle" font-size="13" fill="#ff6b6b" font-weight="bold">★ 辅助相机</text>
    <text x="0" y="65" text-anchor="middle" font-size="11" fill="#718096">道闸前侧方低位</text>
    <text x="0" y="82" text-anchor="middle" font-size="10" fill="#718096">高度3-4m，45°角</text>
    <text x="0" y="99" text-anchor="middle" font-size="9" fill="#c92a2a" font-weight="bold">门端ISO码+锁杆</text>
    
    <!-- 拍摄范围指示线 - 指向门端区域 -->
    <path d="M -30,-22 L -100,-320" stroke="#ff9a9e" stroke-width="2" stroke-dasharray="5,5" opacity="0.8"/>
    <path d="M 0,-22 L -60,-320" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="5,5" opacity="0.8"/>
    <path d="M 30,-22 L -20,-320" stroke="#ff9a9e" stroke-width="2" stroke-dasharray="5,5" opacity="0.8"/>
  </g>
  
  <!-- 顶部相机拍摄范围示意 -->
  <g transform="translate(300, 160)">
    <!-- C5 拍摄范围扇形示意 -->
    <path d="M 0,0 L -80,100 L 80,100 Z" fill="rgba(102,126,234,0.15)" stroke="#667eea" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="0" y="80" text-anchor="middle" font-size="10" fill="#667eea">C5拍摄范围</text>
  </g>
  
  <g transform="translate(900, 160)">
    <!-- C6 拍摄范围扇形示意 -->
    <path d="M 0,0 L -80,100 L 80,100 Z" fill="rgba(118,75,162,0.15)" stroke="#764ba2" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="0" y="80" text-anchor="middle" font-size="10" fill="#764ba2">C6拍摄范围</text>
  </g>
  
  <!-- 行驶方向 -->
  <g transform="translate(600, 820)">
    <text x="0" y="-20" text-anchor="middle" font-size="14" fill="#4a5568" font-weight="bold">车辆行驶方向</text>
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#667eea" stroke-width="5" marker-end="url(#arrowBlue)"/>
    <polygon points="150,-15 175,0 150,15" fill="#667eea"/>
  </g>
  
  <!-- 图例说明 -->
  <g transform="translate(30, 750)">
    <rect x="0" y="0" width="380" height="85" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="190" y="22" text-anchor="middle" font-size="12" fill="#2d3748" font-weight="bold">图例</text>
    
    <circle cx="35" cy="50" r="10" fill="#667eea"/>
    <text x="55" y="54" font-size="10" fill="#4a5568">顶部相机C5</text>
    
    <circle cx="140" cy="50" r="10" fill="#764ba2"/>
    <text x="160" y="54" font-size="10" fill="#4a5568">顶部相机C6</text>
    
    <rect x="235" y="42" width="20" height="16" rx="4" fill="url(#processGrad)"/>
    <text x="265" y="54" font-size="10" fill="#4a5568">侧方相机C3/C4</text>
    
    <rect x="235" y="62" width="20" height="16" rx="4" fill="url(#auxCameraGrad)"/>
    <text x="265" y="74" font-size="10" fill="#4a5568">辅助相机C7</text>
  </g>
  
  <!-- 覆盖逻辑说明 -->
  <g transform="translate(450, 750)">
    <rect x="0" y="0" width="720" height="135" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="360" y="22" text-anchor="middle" font-size="12" fill="#2d3748" font-weight="bold">5.5摄像头覆盖逻辑（头尾安装模式）</text>
    
    <text x="15" y="42" font-size="10" fill="#4a5568">• C5(道闸前上方8-10m)：实时检测+车头定位，俯拍前半箱体</text>
    <text x="15" y="57" font-size="10" fill="#4a5568">• C6(道闸后上方8-10m)：车尾定位+箱型判断，俯拍后半箱体</text>
    <text x="15" y="72" font-size="10" fill="#4a5568">• C3(道闸前侧方4m)：拍摄车辆前半部分，俯角30°</text>
    <text x="15" y="87" font-size="10" fill="#4a5568">• C4(道闸后侧方4m)：拍摄车辆后半部分，俯角30°</text>
    <text x="15" y="102" font-size="10" fill="#c92a2a" font-weight="bold">• C7(道闸前侧方低位3-4m)：★ 辅助相机 - 门端ISO码+锁杆+备用识别，45°角</text>
    <text x="15" y="120" font-size="9" fill="#718096" font-style="italic">注：当两侧无安装空间时，C3/C4从前后方拍摄；C7作为辅助相机专门拍摄门端细节和锁杆状态</text>
  </g>
</svg>
