<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="topCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="dualBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="auxCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    
    <filter id="strongShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    
    <marker id="arrowBlueDown" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="270">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
    </marker>
    
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00f2fe"/>
    </marker>
    
    <marker id="arrowAux" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="900" fill="#fafbfc"/>
  
  <!-- 标题区域 -->
  <g transform="translate(0, 0)">
    <rect width="1200" height="70" fill="url(#headerGrad)"/>
    <text x="600" y="30" text-anchor="middle" font-size="22" fill="white" font-weight="bold">
      5.5摄像头方案：头尾安装模式（两侧无空间）- 双20尺纵向排列
    </text>
    <text x="600" y="52" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.9)">
      两个20尺集装箱前后连接（前箱+后箱），总长12m，C3/C4从前后方拍摄
    </text>
  </g>
  
  <!-- ===== 俯视图区域 ===== -->
  <g transform="translate(350, 100)">
    <text x="250" y="-10" text-anchor="middle" font-size="14" fill="#4a5568" font-weight="bold">【俯视图】车辆与相机位置布局</text>
    
    <!-- 车道区域背景 -->
    <rect x="0" y="0" width="500" height="600" fill="#f0f2f5" stroke="#cbd5e0" stroke-width="2" rx="5"/>
    <text x="250" y="-25" text-anchor="middle" font-size="12" fill="#718096">车道宽度 3.5m</text>
    
    <!-- 车道中心虚线 -->
    <line x1="250" y1="0" x2="250" y2="600" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="15,8"/>
    
    <!-- ===== 龙门架A - 入口侧（道闸前）===== -->
    <rect x="-20" y="20" width="540" height="50" rx="8" fill="url(#topCameraGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#shadow)"/>
    <text x="250" y="45" text-anchor="middle" font-size="13" fill="white" font-weight="bold">龙门架A - 道闸前 (8-10m)</text>
    <text x="250" y="62" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">顶部相机C5覆盖车头+前箱</text>
    
    <!-- C5相机位置 -->
    <g transform="translate(180, 45)">
      <circle cx="0" cy="0" r="18" fill="#667eea" stroke="white" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C5</text>
    </g>
    
    <!-- ===== 龙门架B - 出口侧（道闸后）===== -->
    <rect x="-20" y="530" width="540" height="50" rx="8" fill="url(#topCameraGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#shadow)"/>
    <text x="250" y="555" text-anchor="middle" font-size="13" fill="white" font-weight="bold">龙门架B - 道闸后 (8-10m)</text>
    <text x="250" y="572" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">顶部相机C6覆盖后箱+车尾</text>
    
    <!-- C6相机位置 -->
    <g transform="translate(180, 555)">
      <circle cx="0" cy="0" r="18" fill="#764ba2" stroke="white" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C6</text>
    </g>
    
    <!-- ===== 道闸位置 ===== -->
    <g transform="translate(100, 150)">
      <rect x="0" y="0" width="300" height="35" rx="6" fill="url(#gateGrad)" filter="url(#shadow)"/>
      <text x="150" y="23" text-anchor="middle" font-size="13" fill="white" font-weight="bold">道闸位置</text>
    </g>
    
    <!-- ===== 双20尺集装箱 - 纵向排列 ===== -->
    <!-- 前箱（20尺） -->
    <g transform="translate(80, 190)">
      <rect x="0" y="0" width="140" height="200" rx="6" fill="url(#dualBoxGrad)" filter="url(#shadow)" opacity="0.95" stroke="#2d8a4e" stroke-width="2"/>
      <text x="70" y="60" text-anchor="middle" font-size="14" fill="#1a535c" font-weight="bold">前箱</text>
      <text x="70" y="85" text-anchor="middle" font-size="11" fill="#1a535c">20尺集装箱</text>
      <text x="70" y="105" text-anchor="middle" font-size="10" fill="#1a535c">车头侧</text>
      <text x="70" y="160" text-anchor="middle" font-size="9" fill="#1a535c">C3/C5/C7覆盖</text>
      
      <!-- 箱号区 -->
      <rect x="35" y="120" width="70" height="25" rx="4" fill="rgba(255,255,255,0.5)" stroke="#38f9d7" stroke-width="1.5"/>
      <text x="70" y="137" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号区</text>
      
      <!-- 门端区（连接处） -->
      <rect x="30" y="170" width="80" height="25" rx="4" fill="rgba(255,154,158,0.4)" stroke="#ff6b6b" stroke-width="1.5"/>
      <text x="70" y="187" text-anchor="middle" font-size="8" fill="#c92a2a" font-weight="bold">门端连接处</text>
    </g>
    
    <!-- 后箱（20尺） -->
    <g transform="translate(80, 395)">
      <rect x="0" y="0" width="140" height="120" rx="6" fill="url(#dualBoxGrad)" filter="url(#shadow)" opacity="0.95" stroke="#2d8a4e" stroke-width="2"/>
      <text x="70" y="35" text-anchor="middle" font-size="14" fill="#1a535c" font-weight="bold">后箱</text>
      <text x="70" y="60" text-anchor="middle" font-size="11" fill="#1a535c">20尺集装箱</text>
      <text x="70" y="80" text-anchor="middle" font-size="10" fill="#1a535c">车尾侧</text>
      <text x="70" y="105" text-anchor="middle" font-size="9" fill="#1a535c">C4/C6覆盖</text>
      
      <!-- 箱号区 -->
      <rect x="35" y="15" width="70" height="25" rx="4" fill="rgba(255,255,255,0.5)" stroke="#38f9d7" stroke-width="1.5"/>
      <text x="70" y="32" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号区</text>
    </g>
    
    <!-- ===== 车辆示意（简化卡车俯视）===== -->
    <g transform="translate(120, 100)">
      <!-- 车头 -->
      <rect x="0" y="0" width="60" height="80" rx="8" fill="#4299e1" opacity="0.8" filter="url(#shadow)" stroke="#2b6cb0" stroke-width="2"/>
      <text x="30" y="45" text-anchor="middle" font-size="11" fill="white" font-weight="bold">车头</text>
      <!-- 行驶方向箭头（向下指，与车头→车尾布局一致） -->
      <polygon points="30,95 45,80 30,85 15,80" fill="#667eea"/>
      <line x1="30" y1="80" x2="30" y2="110" stroke="#667eea" stroke-width="3" marker-end="url(#arrowBlue)"/>
    </g>
    
    <!-- 车尾示意 -->
    <g transform="translate(120, 520)">
      <rect x="0" y="0" width="60" height="40" rx="6" fill="#4299e1" opacity="0.6" filter="url(#shadow)" stroke="#2b6cb0" stroke-width="2"/>
      <text x="30" y="25" text-anchor="middle" font-size="10" fill="white" font-weight="bold">车尾</text>
    </g>
    
    <!-- ===== C3相机 - 道闸前侧方（俯视显示在前方）===== -->
    <g transform="translate(30, 250)">
      <circle cx="0" cy="0" r="22" fill="url(#processGrad)" stroke="#f5576c" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C3</text>
      <!-- 拍摄范围指示（俯视角度）-->
      <path d="M 22,0 L 120,-40" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <path d="M 22,15 L 120,60" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#f5576c" font-weight="bold">C3</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#718096">前侧方</text>
    </g>
    
    <!-- ===== C4相机 - 道闸后侧方（俯视显示在后方）===== -->
    <g transform="translate(560, 420)">
      <circle cx="0" cy="0" r="22" fill="url(#processGrad)" stroke="#f5576c" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C4</text>
      <!-- 拍摄范围指示（俯视角度）-->
      <path d="M -22,-10 L -140,-50" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <path d="M -22,10 L -140,40" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#f093fb" font-weight="bold">C4</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#718096">后侧方</text>
    </g>
    
    <!-- ===== C7辅助相机 - 道闸前侧方低位 ===== -->
    <g transform="translate(30, 350)">
      <rect x="-18" y="-18" width="36" height="36" rx="8" fill="url(#auxCameraGrad)" stroke="#ff6b6b" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#c92a2a" font-weight="bold">C7</text>
      <!-- 拍摄范围指示 -->
      <path d="M 18,-5 L 120,40" stroke="#ff9a9e" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
      <path d="M 18,10 L 120,90" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="9" fill="#ff6b6b" font-weight="bold">辅助</text>
    </g>
    
    <!-- ===== 尺寸标注 ===== -->
    <!-- 总长标注 -->
    <line x1="250" y1="185" x2="250" y2="520" stroke="#718096" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="270" y="350" text-anchor="start" font-size="10" fill="#718096">总长约12m</text>
    <text x="270" y="365" text-anchor="start" font-size="9" fill="#718096">(2×6m)</text>
  </g>
  
  <!-- ===== 相机详细说明区域（左侧）===== -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="280" height="600" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="140" y="25" text-anchor="middle" font-size="13" fill="#2d3748" font-weight="bold">相机配置说明</text>
    
    <!-- C5 -->
    <g transform="translate(20, 50)">
      <circle cx="15" cy="15" r="15" fill="#667eea"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C5</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">顶部相机C5</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前上方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：8-10m</text>
      <text x="40" y="56" font-size="9" fill="#718096">覆盖：车头+前箱</text>
    </g>
    
    <!-- C6 -->
    <g transform="translate(20, 130)">
      <circle cx="15" cy="15" r="15" fill="#764ba2"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C6</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">顶部相机C6</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸后上方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：8-10m</text>
      <text x="40" y="56" font-size="9" fill="#718096">覆盖：后箱+车尾</text>
    </g>
    
    <!-- C3 -->
    <g transform="translate(20, 210)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#processGrad)"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C3</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">前侧方相机C3</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前侧方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：4m，俯角30°</text>
      <text x="40" y="56" font-size="9" fill="#f5576c">覆盖：车辆前半部分</text>
      <text x="40" y="70" font-size="9" fill="#f5576c">（含前箱侧面）</text>
    </g>
    
    <!-- C4 -->
    <g transform="translate(20, 310)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#processGrad)"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C4</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">后侧方相机C4</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸后侧方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：4m，俯角30°</text>
      <text x="40" y="56" font-size="9" fill="#f093fb">覆盖：车辆后半部分</text>
      <text x="40" y="70" font-size="9" fill="#f093fb">（含后箱侧面）</text>
    </g>
    
    <!-- C7 -->
    <g transform="translate(20, 410)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#auxCameraGrad)" stroke="#ff6b6b" stroke-width="1"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="bold">C7</text>
      <text x="40" y="12" font-size="11" fill="#c92a2a" font-weight="bold">★ 辅助相机C7</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前侧方低位</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：3-4m，45°角</text>
      <text x="40" y="56" font-size="9" fill="#ff6b6b">覆盖：门端ISO码+锁杆</text>
      <text x="40" y="70" font-size="9" fill="#ff6b6b">备用识别</text>
    </g>
    
    <!-- 关键理解说明 -->
    <g transform="translate(15, 520)">
      <rect x="0" y="0" width="250" height="70" fill="#fff5f5" stroke="#feb2b2" stroke-width="1" rx="4"/>
      <text x="125" y="18" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="bold">关键理解</text>
      <text x="10" y="35" font-size="9" fill="#4a5568">• 两侧无空间，C3/C4从前后方拍摄</text>
      <text x="10" y="50" font-size="9" fill="#4a5568">• C3拍前半部分（车头+前箱）</text>
      <text x="10" y="65" font-size="9" fill="#4a5568">• C4拍后半部分（后箱+车尾）</text>
    </g>
  </g>
  
  <!-- ===== 行驶方向标注（下方）===== -->
  <g transform="translate(600, 730)">
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#4a5568" font-weight="bold">车辆行驶方向</text>
    <line x1="-120" y1="25" x2="120" y2="25" stroke="#667eea" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <text x="0" y="55" text-anchor="middle" font-size="11" fill="#718096">入口 → 道闸 → 出口</text>
  </g>
  
  <!-- ===== 覆盖逻辑说明（底部）===== -->
  <g transform="translate(30, 780)">
    <rect x="0" y="0" width="1140" height="105" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="570" y="22" text-anchor="middle" font-size="12" fill="#2d3748" font-weight="bold">5.5摄像头覆盖逻辑（头尾安装模式 - 双20尺纵向排列）</text>
    
    <text x="15" y="42" font-size="10" fill="#4a5568">• C5(道闸前上方8-10m)：实时检测+车头定位，俯拍车头+前箱整体</text>
    <text x="15" y="57" font-size="10" fill="#4a5568">• C6(道闸后上方8-10m)：车尾定位+箱型判断，俯拍后箱+车尾整体</text>
    <text x="400" y="42" font-size="10" fill="#4a5568">• C3(道闸前侧方4m)：拍摄车辆前半部分，含前箱侧面，俯角30°</text>
    <text x="400" y="57" font-size="10" fill="#4a5568">• C4(道闸后侧方4m)：拍摄车辆后半部分，含后箱侧面，俯角30°</text>
    <text x="780" y="42" font-size="10" fill="#c92a2a" font-weight="bold">• C7(道闸前侧方低位3-4m)：★ 辅助相机 - 门端ISO码+锁杆，45°角</text>
    <text x="780" y="57" font-size="10" fill="#4a5568">• 双20尺纵向排列：前箱(车头侧) + 后箱(车尾侧)，总长12m</text>
    
    <text x="15" y="85" font-size="9" fill="#718096" font-style="italic">注：当两侧无安装空间时采用头尾安装模式；C3/C4分别从前后方向拍摄；C7专门拍摄前箱门端细节和锁杆状态</text>
    <text x="15" y="100" font-size="9" fill="#718096" font-style="italic">     所有箱号区位于各箱侧面，C3/C4通过前后角度可拍摄到各自对应箱体的侧面箱号</text>
  </g>
</svg>
