<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- C5/C6蓝色渐变 -->
    <linearGradient id="blueCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <!-- C3/C4紫色渐变 -->
    <linearGradient id="purpleCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />
    </linearGradient>
    
    <!-- C7橙色/红色渐变（辅助） -->
    <linearGradient id="orangeCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    
    <!-- 集装箱绿色渐变 -->
    <linearGradient id="containerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    
    <!-- 车头/车尾蓝色 -->
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- 道闸渐变 -->
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    
    <filter id="strongShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
    
    <marker id="arrowBlueRight" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="900" fill="#fafbfc"/>
  
  <!-- 标题区域 -->
  <g transform="translate(0, 0)">
    <rect width="1200" height="75" fill="url(#headerGrad)"/>
    <text x="600" y="32" text-anchor="middle" font-size="22" fill="white" font-weight="bold">
      5.5摄像头方案：头尾安装模式（两侧无空间）- 双20尺纵向排列
    </text>
    <text x="600" y="58" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.9)">
      两个20尺集装箱纵向排列（后箱+前箱），总长12m，C3/C4从前后方拍摄
    </text>
  </g>
  
  <!-- ===== 俯视图区域 ===== -->
  <g transform="translate(350, 95)">
    <text x="250" y="-10" text-anchor="middle" font-size="14" fill="#4a5568" font-weight="bold">【俯视图】车辆与相机位置布局</text>
    
    <!-- 车道区域背景（横向长方形） -->
    <rect x="0" y="0" width="500" height="600" fill="#f0f2f5" stroke="#cbd5e0" stroke-width="2" rx="5"/>
    
    <!-- 车道中心虚线（横向，从左到右） -->
    <line x1="0" y1="300" x2="500" y2="300" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="15,8"/>
    
    <!-- ===== 道闸位置（中间） ===== -->
    <g transform="translate(240, 80)">
      <rect x="0" y="0" width="20" height="440" rx="6" fill="url(#gateGrad)" filter="url(#shadow)"/>
      <text x="10" y="220" text-anchor="middle" font-size="12" fill="white" font-weight="bold" transform="rotate(-90, 10, 220)">道闸</text>
    </g>
    
    <!-- ===== 纵向排列的双20尺集装箱 ===== -->
    <!-- 后箱（20尺，6m，位于车道左侧，靠近入口/车尾） -->
    <g transform="translate(60, 180)">
      <rect x="0" y="0" width="160" height="240" rx="6" fill="url(#containerGrad)" filter="url(#shadow)" opacity="0.95" stroke="#2d8a4e" stroke-width="2"/>
      <text x="80" y="60" text-anchor="middle" font-size="16" fill="#1a535c" font-weight="bold">后箱</text>
      <text x="80" y="90" text-anchor="middle" font-size="12" fill="#1a535c">20尺集装箱</text>
      <text x="80" y="115" text-anchor="middle" font-size="11" fill="#1a535c">6m</text>
      <text x="80" y="140" text-anchor="middle" font-size="10" fill="#1a535c">靠近入口（车尾侧）</text>
      <text x="80" y="165" text-anchor="middle" font-size="9" fill="#1a535c">C5/C3/C7覆盖</text>
      
      <!-- 箱号区 -->
      <rect x="20" y="190" width="50" height="30" rx="4" fill="rgba(255,255,255,0.5)" stroke="#38f9d7" stroke-width="1.5"/>
      <text x="45" y="210" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号</text>
    </g>
    
    <!-- 前箱（20尺，6m，位于车道右侧，靠近出口/车头） -->
    <g transform="translate(280, 180)">
      <rect x="0" y="0" width="160" height="240" rx="6" fill="url(#containerGrad)" filter="url(#shadow)" opacity="0.95" stroke="#2d8a4e" stroke-width="2"/>
      <text x="80" y="60" text-anchor="middle" font-size="16" fill="#1a535c" font-weight="bold">前箱</text>
      <text x="80" y="90" text-anchor="middle" font-size="12" fill="#1a535c">20尺集装箱</text>
      <text x="80" y="115" text-anchor="middle" font-size="11" fill="#1a535c">6m</text>
      <text x="80" y="140" text-anchor="middle" font-size="10" fill="#1a535c">靠近出口（车头侧）</text>
      <text x="80" y="165" text-anchor="middle" font-size="9" fill="#1a535c">C6/C4覆盖</text>
      
      <!-- 箱号区 -->
      <rect x="20" y="190" width="50" height="30" rx="4" fill="rgba(255,255,255,0.5)" stroke="#38f9d7" stroke-width="1.5"/>
      <text x="45" y="210" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号</text>
    </g>
    
    <!-- ===== 车辆示意 ===== -->
    <!-- 车尾（左侧，入口侧） -->
    <g transform="translate(10, 240)">
      <rect x="0" y="0" width="40" height="120" rx="6" fill="#4299e1" opacity="0.8" filter="url(#shadow)" stroke="#2b6cb0" stroke-width="2"/>
      <text x="20" y="65" text-anchor="middle" font-size="12" fill="white" font-weight="bold">车尾</text>
    </g>
    
    <!-- 车头（右侧，出口侧） -->
    <g transform="translate(450, 240)">
      <rect x="0" y="0" width="50" height="120" rx="8" fill="#4299e1" opacity="0.9" filter="url(#shadow)" stroke="#2b6cb0" stroke-width="2"/>
      <text x="25" y="55" text-anchor="middle" font-size="12" fill="white" font-weight="bold">车头</text>
      <text x="25" y="75" text-anchor="middle" font-size="9" fill="white">驾驶室</text>
    </g>
    
    <!-- ===== C5相机 - 道闸前上方 ===== -->
    <g transform="translate(140, 50)">
      <circle cx="0" cy="0" r="22" fill="url(#blueCameraGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C5</text>
      <!-- 拍摄范围指示 -->
      <path d="M -15,15 L -60,130" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <path d="M 15,15 L 60,130" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <!-- 标注 -->
      <text x="0" y="-35" text-anchor="middle" font-size="10" fill="#4facfe" font-weight="bold">C5</text>
      <text x="0" y="-20" text-anchor="middle" font-size="9" fill="#718096">道闸前上方</text>
    </g>
    
    <!-- ===== C6相机 - 道闸后上方 ===== -->
    <g transform="translate(360, 50)">
      <circle cx="0" cy="0" r="22" fill="url(#blueCameraGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C6</text>
      <!-- 拍摄范围指示 -->
      <path d="M -15,15 L -60,130" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <path d="M 15,15 L 60,130" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <!-- 标注 -->
      <text x="0" y="-35" text-anchor="middle" font-size="10" fill="#4facfe" font-weight="bold">C6</text>
      <text x="0" y="-20" text-anchor="middle" font-size="9" fill="#718096">道闸后上方</text>
    </g>
    
    <!-- ===== C3相机 - 道闸前侧方 ===== -->
    <g transform="translate(140, 520)">
      <circle cx="0" cy="0" r="22" fill="url(#purpleCameraGrad)" stroke="#a18cd1" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C3</text>
      <!-- 拍摄范围指示 -->
      <path d="M -15,-15 L -60,-130" stroke="#a18cd1" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <path d="M 15,-15 L 60,-100" stroke="#a18cd1" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#a18cd1" font-weight="bold">C3</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#718096">道闸前侧方</text>
      <text x="0" y="75" text-anchor="middle" font-size="9" fill="#718096">拍后箱侧面</text>
    </g>
    
    <!-- ===== C4相机 - 道闸后侧方 ===== -->
    <g transform="translate(360, 520)">
      <circle cx="0" cy="0" r="22" fill="url(#purpleCameraGrad)" stroke="#a18cd1" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C4</text>
      <!-- 拍摄范围指示 -->
      <path d="M -15,-15 L -60,-100" stroke="#a18cd1" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <path d="M 15,-15 L 60,-130" stroke="#a18cd1" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#a18cd1" font-weight="bold">C4</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#718096">道闸后侧方</text>
      <text x="0" y="75" text-anchor="middle" font-size="9" fill="#718096">拍前箱侧面</text>
    </g>
    
    <!-- ===== C7辅助相机 - 道闸前侧方低位 ===== -->
    <g transform="translate(80, 520)">
      <rect x="-18" y="-18" width="36" height="36" rx="8" fill="url(#orangeCameraGrad)" stroke="#ff6b6b" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#c92a2a" font-weight="bold">C7</text>
      <!-- 拍摄范围指示 -->
      <path d="M 18,-5 L 70,-100" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
      <path d="M 18,10 L 80,-80" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="9" fill="#ff6b6b" font-weight="bold">辅助</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#718096">侧方低位</text>
    </g>
    
    <!-- ===== 门端标记（后箱左侧） ===== -->
    <g transform="translate(60, 250)">
      <rect x="-8" y="0" width="16" height="80" rx="4" fill="rgba(255,154,158,0.6)" stroke="#ff6b6b" stroke-width="1.5"/>
      <text x="-15" y="45" text-anchor="middle" font-size="9" fill="#c92a2a" font-weight="bold" transform="rotate(-90, -15, 45)">门端</text>
    </g>
    
    <!-- ===== 尺寸标注 ===== -->
    <!-- 总长标注 -->
    <line x1="60" y1="450" x2="440" y2="450" stroke="#718096" stroke-width="1" stroke-dasharray="4,2"/>
    <line x1="60" y1="445" x2="60" y2="455" stroke="#718096" stroke-width="1"/>
    <line x1="220" y1="445" x2="220" y2="455" stroke="#718096" stroke-width="1"/>
    <line x1="280" y1="445" x2="280" y2="455" stroke="#718096" stroke-width="1"/>
    <line x1="440" y1="445" x2="440" y2="455" stroke="#718096" stroke-width="1"/>
    <text x="140" y="475" text-anchor="middle" font-size="10" fill="#718096">6m</text>
    <text x="360" y="475" text-anchor="middle" font-size="10" fill="#718096">6m</text>
    <text x="250" y="495" text-anchor="middle" font-size="11" fill="#4a5568" font-weight="bold">总长12m</text>
  </g>
  
  <!-- ===== 相机详细说明区域（左侧）===== -->
  <g transform="translate(25, 95)">
    <rect x="0" y="0" width="300" height="600" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="150" y="25" text-anchor="middle" font-size="14" fill="#2d3748" font-weight="bold">相机配置说明</text>
    
    <!-- C5 -->
    <g transform="translate(20, 50)">
      <circle cx="15" cy="15" r="15" fill="url(#blueCameraGrad)"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C5</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">顶部相机C5</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前上方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：8-10m</text>
      <text x="40" y="56" font-size="9" fill="#4facfe">覆盖：车尾+后箱俯拍</text>
    </g>
    
    <!-- C6 -->
    <g transform="translate(20, 125)">
      <circle cx="15" cy="15" r="15" fill="url(#blueCameraGrad)"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C6</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">顶部相机C6</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸后上方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：8-10m</text>
      <text x="40" y="56" font-size="9" fill="#4facfe">覆盖：前箱+车头俯拍</text>
    </g>
    
    <!-- C3 -->
    <g transform="translate(20, 200)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#purpleCameraGrad)"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C3</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">道闸前侧方相机C3</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前侧方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：4m，俯角30°</text>
      <text x="40" y="56" font-size="9" fill="#a18cd1">覆盖：拍后箱侧面</text>
    </g>
    
    <!-- C4 -->
    <g transform="translate(20, 285)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#purpleCameraGrad)"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C4</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">道闸后侧方相机C4</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸后侧方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：4m，俯角30°</text>
      <text x="40" y="56" font-size="9" fill="#a18cd1">覆盖：拍前箱侧面</text>
    </g>
    
    <!-- C7 -->
    <g transform="translate(20, 370)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#orangeCameraGrad)" stroke="#ff6b6b" stroke-width="1"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="bold">C7</text>
      <text x="40" y="12" font-size="11" fill="#c92a2a" font-weight="bold">★ 辅助相机C7</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前侧方低位</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：3-4m，45°角</text>
      <text x="40" y="56" font-size="9" fill="#ff6b6b">覆盖：后箱门端ISO码</text>
      <text x="40" y="70" font-size="9" fill="#ff6b6b">+锁杆备用识别</text>
    </g>
    
    <!-- 关键理解说明 -->
    <g transform="translate(15, 480)">
      <rect x="0" y="0" width="270" height="105" fill="#fff5f5" stroke="#feb2b2" stroke-width="1" rx="4"/>
      <text x="135" y="18" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="bold">关键理解</text>
      <text x="10" y="38" font-size="9" fill="#4a5568">• 两侧无空间，C3/C4从前后方斜拍</text>
      <text x="10" y="55" font-size="9" fill="#4a5568">• C3在道闸前侧方，拍后箱侧面</text>
      <text x="10" y="72" font-size="9" fill="#4a5568">• C4在道闸后侧方，拍前箱侧面</text>
      <text x="10" y="89" font-size="9" fill="#4a5568">• 行驶方向：左→右（车尾→车头）</text>
    </g>
  </g>
  
  <!-- ===== 行驶方向标注（下方）===== -->
  <g transform="translate(600, 720)">
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#4a5568" font-weight="bold">车辆行驶方向（从左到右）</text>
    <line x1="-150" y1="25" x2="150" y2="25" stroke="#667eea" stroke-width="4" marker-end="url(#arrowBlueRight)"/>
    <text x="0" y="55" text-anchor="middle" font-size="12" fill="#718096">入口（左/车尾侧） → 道闸 → 出口（右/车头侧）</text>
  </g>
  
  <!-- ===== 覆盖逻辑说明（底部）===== -->
  <g transform="translate(25, 780)">
    <rect x="0" y="0" width="1150" height="110" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="575" y="22" text-anchor="middle" font-size="13" fill="#2d3748" font-weight="bold">5.5摄像头覆盖逻辑（头尾安装模式 - 双20尺纵向排列）</text>
    
    <text x="15" y="45" font-size="10" fill="#4a5568">• C5(道闸前上方8-10m)：实时检测+车尾定位，俯拍车尾+后箱整体</text>
    <text x="15" y="60" font-size="10" fill="#4a5568">• C6(道闸后上方8-10m)：车头定位+箱型判断，俯拍前箱+车头整体</text>
    
    <text x="400" y="45" font-size="10" fill="#4a5568">• C3(道闸前侧方4m)：从道闸前侧方拍摄，俯角30°，覆盖后箱侧面</text>
    <text x="400" y="60" font-size="10" fill="#4a5568">• C4(道闸后侧方4m)：从道闸后侧方拍摄，俯角30°，覆盖前箱侧面</text>
    
    <text x="780" y="45" font-size="10" fill="#c92a2a" font-weight="bold">• C7(道闸前侧方低位3-4m)：★ 辅助相机 - 后箱门端ISO码+锁杆，45°角</text>
    <text x="780" y="60" font-size="10" fill="#4a5568">• 双20尺纵向排列：后箱(6m，入口侧/车尾侧) + 前箱(6m，出口侧/车头侧)</text>
    
    <text x="15" y="88" font-size="9" fill="#718096" font-style="italic">注：当两侧无安装空间时采用头尾安装模式；C3/C4分别从前后方向斜向拍摄；C7专门拍摄后箱门端细节和锁杆状态</text>
    <text x="15" y="103" font-size="9" fill="#718096" font-style="italic">物理布局：车尾(左) → 后箱(6m) → 道闸 → 前箱(6m) → 车头(右)，总长12m</text>
  </g>
</svg>
