<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="topCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="dualBoxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="auxCameraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.25"/>
    </filter>
    
    <filter id="strongShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="6" flood-opacity="0.35"/>
    </filter>
    
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    
    <marker id="arrowBlueRight" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="0">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
    
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f5576c"/>
    </marker>
    
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00f2fe"/>
    </marker>
    
    <marker id="arrowAux" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="900" fill="#fafbfc"/>
  
  <!-- 标题区域 -->
  <g transform="translate(0, 0)">
    <rect width="1200" height="70" fill="url(#headerGrad)"/>
    <text x="600" y="30" text-anchor="middle" font-size="22" fill="white" font-weight="bold">
      5.5摄像头方案：头尾安装模式（两侧无空间）- 双20尺纵向排列
    </text>
    <text x="600" y="52" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.9)">
      两个20尺集装箱纵向排列（后箱+前箱），总长12m，C3/C4从前后方斜向拍摄
    </text>
  </g>
  
  <!-- ===== 俯视图区域 ===== -->
  <g transform="translate(350, 100)">
    <text x="250" y="-10" text-anchor="middle" font-size="14" fill="#4a5568" font-weight="bold">【俯视图】车辆与相机位置布局</text>
    
    <!-- 车道区域背景 -->
    <rect x="0" y="0" width="500" height="600" fill="#f0f2f5" stroke="#cbd5e0" stroke-width="2" rx="5"/>
    <text x="250" y="-25" text-anchor="middle" font-size="12" fill="#718096">车辆横向进入，后箱+前箱并排</text>
    
    <!-- 车道中心虚线（横向） -->
    <line x1="0" y1="300" x2="500" y2="300" stroke="#cbd5e0" stroke-width="2" stroke-dasharray="15,8"/>
    
    <!-- ===== 龙门架A - 入口侧（道闸前）===== -->
    <rect x="-20" y="20" width="140" height="560" rx="8" fill="url(#topCameraGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="150" text-anchor="middle" font-size="12" fill="white" font-weight="bold" transform="rotate(-90, 50, 150)">龙门架A - 道闸前 (8-10m)</text>
    <text x="70" y="150" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)" transform="rotate(-90, 70, 150)">顶部相机C5覆盖车尾+后箱</text>
    
    <!-- C5相机位置 -->
    <g transform="translate(50, 80)">
      <circle cx="0" cy="0" r="18" fill="#667eea" stroke="white" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C5</text>
    </g>
    
    <!-- ===== 龙门架B - 出口侧（道闸后）===== -->
    <rect x="380" y="20" width="140" height="560" rx="8" fill="url(#topCameraGrad)" stroke="#00f2fe" stroke-width="2" filter="url(#shadow)"/>
    <text x="450" y="150" text-anchor="middle" font-size="12" fill="white" font-weight="bold" transform="rotate(90, 450, 150)">龙门架B - 道闸后 (8-10m)</text>
    <text x="430" y="150" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)" transform="rotate(90, 430, 150)">顶部相机C6覆盖前箱+车头</text>
    
    <!-- C6相机位置 -->
    <g transform="translate(450, 80)">
      <circle cx="0" cy="0" r="18" fill="#764ba2" stroke="white" stroke-width="2"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C6</text>
    </g>
    
    <!-- ===== 道闸位置 ===== -->
    <g transform="translate(160, 80)">
      <rect x="0" y="0" width="35" height="440" rx="6" fill="url(#gateGrad)" filter="url(#shadow)"/>
      <text x="17" y="220" text-anchor="middle" font-size="13" fill="white" font-weight="bold" transform="rotate(-90, 17, 220)">道闸位置</text>
    </g>
    
    <!-- ===== 双20尺集装箱 - 纵向排列 ===== -->
    <!-- 后箱（20尺，靠近入口侧/左侧） -->
    <g transform="translate(220, 110)">
      <rect x="0" y="0" width="220" height="140" rx="6" fill="url(#dualBoxGrad)" filter="url(#shadow)" opacity="0.95" stroke="#2d8a4e" stroke-width="2"/>
      <text x="110" y="50" text-anchor="middle" font-size="14" fill="#1a535c" font-weight="bold">后箱</text>
      <text x="110" y="75" text-anchor="middle" font-size="11" fill="#1a535c">20尺集装箱</text>
      <text x="110" y="95" text-anchor="middle" font-size="10" fill="#1a535c">靠近入口侧（车尾侧）</text>
      <text x="110" y="120" text-anchor="middle" font-size="9" fill="#1a535c">C5/C3/C7覆盖</text>
      
      <!-- 箱号区 -->
      <rect x="20" y="55" width="60" height="25" rx="4" fill="rgba(255,255,255,0.5)" stroke="#38f9d7" stroke-width="1.5"/>
      <text x="50" y="72" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号区</text>
      
      <!-- 门端区 -->
      <rect x="140" y="55" width="70" height="25" rx="4" fill="rgba(255,154,158,0.4)" stroke="#ff6b6b" stroke-width="1.5"/>
      <text x="175" y="72" text-anchor="middle" font-size="8" fill="#c92a2a" font-weight="bold">门端</text>
    </g>
    
    <!-- 前箱（20尺，靠近出口侧/右侧） -->
    <g transform="translate(220, 260)">
      <rect x="0" y="0" width="220" height="140" rx="6" fill="url(#dualBoxGrad)" filter="url(#shadow)" opacity="0.95" stroke="#2d8a4e" stroke-width="2"/>
      <text x="110" y="50" text-anchor="middle" font-size="14" fill="#1a535c" font-weight="bold">前箱</text>
      <text x="110" y="75" text-anchor="middle" font-size="11" fill="#1a535c">20尺集装箱</text>
      <text x="110" y="95" text-anchor="middle" font-size="10" fill="#1a535c">靠近出口侧（车头侧）</text>
      <text x="110" y="120" text-anchor="middle" font-size="9" fill="#1a535c">C6/C4覆盖</text>
      
      <!-- 箱号区 -->
      <rect x="20" y="55" width="60" height="25" rx="4" fill="rgba(255,255,255,0.5)" stroke="#38f9d7" stroke-width="1.5"/>
      <text x="50" y="72" text-anchor="middle" font-size="9" fill="#1a535c" font-weight="bold">箱号区</text>
    </g>
    
    <!-- ===== 车辆示意（简化卡车俯视，从左到右行驶）===== -->
    <!-- 车尾（左侧，入口侧） -->
    <g transform="translate(80, 190)">
      <rect x="0" y="0" width="40" height="60" rx="6" fill="#4299e1" opacity="0.6" filter="url(#shadow)" stroke="#2b6cb0" stroke-width="2"/>
      <text x="20" y="35" text-anchor="middle" font-size="10" fill="white" font-weight="bold">车尾</text>
    </g>
    
    <!-- 车头（右侧，出口侧） -->
    <g transform="translate(460, 190)">
      <rect x="0" y="0" width="80" height="60" rx="8" fill="#4299e1" opacity="0.8" filter="url(#shadow)" stroke="#2b6cb0" stroke-width="2"/>
      <text x="40" y="35" text-anchor="middle" font-size="11" fill="white" font-weight="bold">车头</text>
      <!-- 行驶方向箭头（向右指） -->
      <polygon points="90,20 110,30 90,40" fill="#667eea"/>
      <line x1="85" y1="30" x2="120" y2="30" stroke="#667eea" stroke-width="3" marker-end="url(#arrowBlueRight)"/>
    </g>
    
    <!-- ===== C3相机 - 道闸前侧方（俯视显示在前方左侧）===== -->
    <g transform="translate(110, 45)">
      <circle cx="0" cy="0" r="22" fill="url(#processGrad)" stroke="#f5576c" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C3</text>
      <!-- 拍摄范围指示（俯视角度）-->
      <path d="M 22,0 L 100,80" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <path d="M 22,15 L 100,120" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#f5576c" font-weight="bold">C3</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#718096">道闸前侧方</text>
    </g>
    
    <!-- ===== C4相机 - 道闸后侧方（俯视显示在后方右侧）===== -->
    <g transform="translate(390, 580)">
      <circle cx="0" cy="0" r="22" fill="url(#processGrad)" stroke="#f5576c" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C4</text>
      <!-- 拍摄范围指示（俯视角度）-->
      <path d="M 0,-22 L 0,-120" stroke="#f5576c" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <path d="M 20,-22 L 100,-120" stroke="#f093fb" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="10" fill="#f093fb" font-weight="bold">C4</text>
      <text x="0" y="60" text-anchor="middle" font-size="9" fill="#718096">道闸后侧方</text>
    </g>
    
    <!-- ===== C7辅助相机 - 道闸前侧方低位 ===== -->
    <g transform="translate(140, 45)">
      <rect x="-18" y="-18" width="36" height="36" rx="8" fill="url(#auxCameraGrad)" stroke="#ff6b6b" stroke-width="2" filter="url(#strongShadow)"/>
      <text x="0" y="5" text-anchor="middle" font-size="11" fill="#c92a2a" font-weight="bold">C7</text>
      <!-- 拍摄范围指示 -->
      <path d="M 18,-5 L 80,50" stroke="#ff9a9e" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
      <path d="M 18,10 L 80,100" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
      <!-- 标注 -->
      <text x="0" y="45" text-anchor="middle" font-size="9" fill="#ff6b6b" font-weight="bold">辅助</text>
    </g>
    
    <!-- ===== 尺寸标注 ===== -->
    <!-- 总宽标注 -->
    <line x1="220" y1="420" x2="440" y2="420" stroke="#718096" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="330" y="440" text-anchor="middle" font-size="10" fill="#718096">总宽约5m</text>
    <text x="330" y="455" text-anchor="middle" font-size="9" fill="#718096">(2×2.5m)</text>
  </g>
  
  <!-- ===== 相机详细说明区域（左侧）===== -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="280" height="600" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="140" y="25" text-anchor="middle" font-size="13" fill="#2d3748" font-weight="bold">相机配置说明</text>
    
    <!-- C5 -->
    <g transform="translate(20, 50)">
      <circle cx="15" cy="15" r="15" fill="#667eea"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C5</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">顶部相机C5</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前上方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：8-10m</text>
      <text x="40" y="56" font-size="9" fill="#718096">覆盖：车尾+后箱</text>
    </g>
    
    <!-- C6 -->
    <g transform="translate(20, 130)">
      <circle cx="15" cy="15" r="15" fill="#764ba2"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C6</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">顶部相机C6</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸后上方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：8-10m</text>
      <text x="40" y="56" font-size="9" fill="#718096">覆盖：前箱+车头</text>
    </g>
    
    <!-- C3 -->
    <g transform="translate(20, 210)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#processGrad)"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C3</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">道闸前侧方相机C3</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前侧方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：4m，俯角30°</text>
      <text x="40" y="56" font-size="9" fill="#f5576c">覆盖：车辆前半部分</text>
      <text x="40" y="70" font-size="9" fill="#f5576c">（含后箱侧面）</text>
    </g>
    
    <!-- C4 -->
    <g transform="translate(20, 310)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#processGrad)"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="white" font-weight="bold">C4</text>
      <text x="40" y="12" font-size="11" fill="#2d3748" font-weight="bold">道闸后侧方相机C4</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸后侧方</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：4m，俯角30°</text>
      <text x="40" y="56" font-size="9" fill="#f093fb">覆盖：车辆后半部分</text>
      <text x="40" y="70" font-size="9" fill="#f093fb">（含前箱侧面）</text>
    </g>
    
    <!-- C7 -->
    <g transform="translate(20, 410)">
      <rect x="0" y="0" width="30" height="30" rx="6" fill="url(#auxCameraGrad)" stroke="#ff6b6b" stroke-width="1"/>
      <text x="15" y="20" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="bold">C7</text>
      <text x="40" y="12" font-size="11" fill="#c92a2a" font-weight="bold">★ 辅助相机C7</text>
      <text x="40" y="28" font-size="9" fill="#718096">位置：道闸前侧方低位</text>
      <text x="40" y="42" font-size="9" fill="#718096">高度：3-4m，45°角</text>
      <text x="40" y="56" font-size="9" fill="#ff6b6b">覆盖：后箱门端ISO码</text>
      <text x="40" y="70" font-size="9" fill="#ff6b6b">+锁杆备用识别</text>
    </g>
    
    <!-- 关键理解说明 -->
    <g transform="translate(15, 520)">
      <rect x="0" y="0" width="250" height="70" fill="#fff5f5" stroke="#feb2b2" stroke-width="1" rx="4"/>
      <text x="125" y="18" text-anchor="middle" font-size="10" fill="#c92a2a" font-weight="bold">关键理解</text>
      <text x="10" y="35" font-size="9" fill="#4a5568">• 两侧无空间，C3/C4从前后方斜拍</text>
      <text x="10" y="50" font-size="9" fill="#4a5568">• C3拍前半部分（含后箱侧面）</text>
      <text x="10" y="65" font-size="9" fill="#4a5568">• C4拍后半部分（含前箱侧面）</text>
    </g>
  </g>
  
  <!-- ===== 行驶方向标注（下方）===== -->
  <g transform="translate(600, 730)">
    <text x="0" y="0" text-anchor="middle" font-size="14" fill="#4a5568" font-weight="bold">车辆行驶方向（从左到右）</text>
    <line x1="-120" y1="25" x2="120" y2="25" stroke="#667eea" stroke-width="4" marker-end="url(#arrowBlueRight)"/>
    <text x="0" y="55" text-anchor="middle" font-size="11" fill="#718096">入口（左/车尾侧） → 道闸 → 出口（右/车头侧）</text>
  </g>
  
  <!-- ===== 覆盖逻辑说明（底部）===== -->
  <g transform="translate(30, 780)">
    <rect x="0" y="0" width="1140" height="105" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="6" filter="url(#shadow)"/>
    <text x="570" y="22" text-anchor="middle" font-size="12" fill="#2d3748" font-weight="bold">5.5摄像头覆盖逻辑（头尾安装模式 - 双20尺纵向排列）</text>
    
    <text x="15" y="42" font-size="10" fill="#4a5568">• C5(道闸前上方8-10m)：实时检测+车尾定位，俯拍车尾+后箱整体</text>
    <text x="15" y="57" font-size="10" fill="#4a5568">• C6(道闸后上方8-10m)：车头定位+箱型判断，俯拍前箱+车头整体</text>
    <text x="400" y="42" font-size="10" fill="#4a5568">• C3(道闸前侧方4m)：拍摄车辆前半部分，含后箱侧面，俯角30°</text>
    <text x="400" y="57" font-size="10" fill="#4a5568">• C4(道闸后侧方4m)：拍摄车辆后半部分，含前箱侧面，俯角30°</text>
    <text x="780" y="42" font-size="10" fill="#c92a2a" font-weight="bold">• C7(道闸前侧方低位3-4m)：★ 辅助相机 - 后箱门端ISO码+锁杆，45°角</text>
    <text x="780" y="57" font-size="10" fill="#4a5568">• 双20尺纵向排列：后箱(入口侧/车尾侧) + 前箱(出口侧/车头侧)，总长12m</text>
    
    <text x="15" y="85" font-size="9" fill="#718096" font-style="italic">注：当两侧无安装空间时采用头尾安装模式；C3/C4分别从前后方向斜向拍摄；C7专门拍摄后箱门端细节和锁杆状态</text>
    <text x="15" y="100" font-size="9" fill="#718096" font-style="italic">     注意：C3在前侧方（靠近入口/左侧），拍前半部分（含后箱侧面）；C4在后侧方（靠近出口/右侧），拍后半部分（含前箱侧面）</text>
  </g>
</svg>
